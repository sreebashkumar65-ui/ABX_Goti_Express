                      </div>
                      
                      {canApproveLeave && <div className="text-sm font-bold text-blue-600 mb-2">{leave.userName}</div>}
                      <div className="text-sm text-slate-800 font-bold mb-1">Date: {formatDateEn(new Date(leave.startDate))} to {formatDateEn(new Date(leave.endDate))}</div>
                      <div className="text-sm text-slate-600 mb-4 bg-slate-50 p-3 rounded-lg border border-slate-100">{leave.reason}</div>
                      
                      {canApproveLeave && leave.status === 'অপেক্ষমান' && (
                          <div className="flex flex-wrap gap-2 border-t border-slate-100 pt-3">
                              <button onClick={() => handleApprove(leave)} className="flex-1 bg-green-50 text-green-600 hover:bg-green-600 hover:text-white py-2 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1"><i className="fa-solid fa-check"></i> Approve</button>
                              <button onClick={() => handleReject(leave)} className="flex-1 bg-red-50 text-red-600 hover:bg-red-600 hover:text-white py-2 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1"><i className="fa-solid fa-xmark"></i> Reject</button>
                          </div>
                      )}
                    </div>
                  ))
                }
              </div>
            </div>
          );
        }

        function ExpenseView({ user, expenses, addExpense, updateExpense, deleteExpense, showConfirm, showPrompt, showAlert, logAction }) {
          const [amount, setAmount] = useState(''); const [desc, setDesc] = useState(''); const [category, setCategory] = useState('travel');
          const [editExpId, setEditExpId] = useState(null);
          const [editCat, setEditCat] = useState(''); const [editAmt, setEditAmt] = useState(''); const [editDesc, setEditDesc] = useState('');
          const [editDate, setEditDate] = useState(''); const [editStatus, setEditStatus] = useState('');

          const canApprove = user.role === 'admin' || user.canApproveExp;
          const canSubmit = user.role !== 'admin' && user.canSubmitExp !== false;

          const submitExpense = (e) => {
            e.preventDefault();
            const newExp = { id: Date.now(), userId: user.id, userName: user.name, category, amount: parseFloat(amount), description: desc, date: formatDateISO(new Date()), status: 'অপেক্ষমান', rejectReason: '' };
            addExpense(newExp);
            setAmount(''); setDesc(''); setCategory('travel'); showAlert('বিল জমা হয়েছে!');
          };

          const handleEditExp = (exp) => {
              setEditExpId(exp.id); setEditCat(exp.category); setEditAmt(exp.amount); setEditDesc(exp.description); setEditDate(exp.date); setEditStatus(exp.status);
              window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const submitEditExp = (e) => {
              e.preventDefault();
              updateExpense(editExpId, { category: editCat, amount: parseFloat(editAmt), description: editDesc, date: editDate, status: editStatus });
              logAction(`Updated expense ${editExpId}`);
              setEditExpId(null); showAlert('বিল আপডেট হয়েছে!');
          };

          const handleReject = (id) => {
             showPrompt('বাতিল করার কারণ লিখুন:', (reason) => {
               if(reason) { 
                   updateExpense(id, { status: 'বাতিল', rejectReason: reason, rejectedAt: getCurrentTimeStr(), rejectedBy: user.designation }); 
                   logAction(`Rejected expense ${id}`);
               }
             });
          };

          const handleApprove = (id) => {
              updateExpense(id, {status: 'অনুমোদিত', approvedAt: getCurrentTimeStr(), approvedBy: user.designation});
              logAction(`Approved expense ${id}`);
          };
          const handleMarkPaid = (id) => {
              updateExpense(id, {status: 'পেইড', paidAt: getCurrentTimeStr(), paidBy: user.designation});
              logAction(`Marked expense ${id} as paid`);
          };

          const displayExpenses = canApprove ? expenses : expenses.filter(e => e.userId === user.id);
          
          const myPending = displayExpenses.filter(e => e.status === 'অপেক্ষমান').reduce((sum, e) => sum + (e.amount||0), 0);
          const myApproved = displayExpenses.filter(e => e.status === 'অনুমোদিত').reduce((sum, e) => sum + (e.amount||0), 0);
          const myPaid = displayExpenses.filter(e => e.status === 'পেইড').reduce((sum, e) => sum + (e.amount||0), 0);

          return (
            <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
              <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2">
                <i className="fa-solid fa-money-bill-wave text-blue-500"></i> যাতায়াত ও অন্যান্য বিল
              </h2>

              <div className="grid grid-cols-3 gap-2 md:gap-4 mb-6">
                 <div className="bg-orange-50 border border-orange-100 p-3 md:p-4 rounded-xl text-center"><p className="text-[10px] md:text-xs text-orange-600 font-bold uppercase">অপেক্ষমান</p><p className="text-lg md:text-2xl font-black text-orange-700">৳{myPending}</p></div>
                 <div className="bg-blue-50 border border-blue-100 p-3 md:p-4 rounded-xl text-center"><p className="text-[10px] md:text-xs text-blue-600 font-bold uppercase">অনুমোদিত</p><p className="text-lg md:text-2xl font-black text-blue-700">৳{myApproved}</p></div>
                 <div className="bg-green-50 border border-green-100 p-3 md:p-4 rounded-xl text-center"><p className="text-[10px] md:text-xs text-green-600 font-bold uppercase">পেইড</p><p className="text-lg md:text-2xl font-black text-green-700">৳{myPaid}</p></div>
              </div>
              
              {user.role === 'admin' && editExpId && (
                  <form onSubmit={submitEditExp} className="mb-8 bg-blue-50/50 p-5 rounded-2xl border border-blue-100 grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div className="md:col-span-3 font-bold text-blue-700 border-b border-blue-200 pb-2"><i className="fa-solid fa-pen mr-2"></i> বিল এডিট করুন</div>
                      <div><label className="block text-xs font-bold mb-1">ধরন</label><select value={editCat} onChange={e=>setEditCat(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-xl outline-none"><option value="travel">যাতায়াত</option><option value="other">অন্যান্য বিল</option></select></div>
                      <div><label className="block text-xs font-bold mb-1">পরিমাণ (৳)</label><input type="number" value={editAmt} onChange={e=>setEditAmt(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-xl outline-none" required /></div>
                      <div><label className="block text-xs font-bold mb-1">তারিখ</label><input type="date" value={editDate} onChange={e=>setEditDate(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-xl outline-none" required /></div>
                      <div className="md:col-span-2"><label className="block text-xs font-bold mb-1">বিবরণ</label><input type="text" value={editDesc} onChange={e=>setEditDesc(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-xl outline-none" required /></div>
                      <div><label className="block text-xs font-bold mb-1">স্ট্যাটাস</label><select value={editStatus} onChange={e=>setEditStatus(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-xl outline-none"><option value="অপেক্ষমান">অপেক্ষমান</option><option value="অনুমোদিত">অনুমোদিত</option><option value="পেইড">পেইড</option><option value="বাতিল">বাতিল</option></select></div>
                      <div className="md:col-span-3 flex gap-2 mt-2">
                         <button type="submit" className="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold">আপডেট করুন</button>
                         <button type="button" onClick={()=>setEditExpId(null)} className="bg-slate-300 text-slate-700 px-6 py-2.5 rounded-xl font-bold">বাতিল</button>
                      </div>
                  </form>
              )}

              {canSubmit && (
                <form onSubmit={submitExpense} className="mb-8 bg-blue-50/50 p-5 md:p-6 rounded-2xl border border-blue-100 flex flex-col md:flex-row gap-4 md:items-end">
                  <div className="w-full md:w-1/4">
                    <label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">ধরন</label>
                    <select value={category} onChange={e=>setCategory(e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                      <option value="travel">যাতায়াত</option>
                      <option value="other">অন্যান্য বিল</option>
                    </select>
                  </div>
                  <div className="w-full md:w-1/4"><label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">পরিমাণ (৳)</label><div className="relative"><span className="absolute left-4 top-3.5 text-slate-400 font-bold">৳</span><input type="number" value={amount} onChange={e => setAmount(e.target.value)} className="w-full pl-8 pr-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required placeholder="0.00" /></div></div>
                  <div className="w-full md:w-1/3"><label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">বিবরণ/স্থান</label><input type="text" value={desc} onChange={e => setDesc(e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required placeholder="বিবরণ..." /></div>
                  <button type="submit" className="w-full md:w-auto bg-blue-600 text-white px-8 py-3.5 rounded-xl hover:bg-blue-700 font-bold whitespace-nowrap shadow-lg active:scale-95 transition-all"><i className="fa-solid fa-plus mr-2"></i>এন্ট্রি করুন</button>
                </form>
              )}
              
              <div className="hidden md:block overflow-x-auto rounded-xl border border-slate-200">
                <table className="w-full text-left border-collapse">
                  <thead><tr className="bg-slate-50 text-slate-500 uppercase text-xs tracking-wider border-b border-slate-200"><th className="p-4 font-bold">তারিখ</th>{canApprove && <th className="p-4 font-bold">নাম</th>}<th className="p-4 font-bold">ধরন</th><th className="p-4 font-bold">বিবরণ</th><th className="p-4 font-bold">পরিমাণ</th><th className="p-4 font-bold">স্ট্যাটাস</th><th className="p-4 font-bold">অ্যাকশন</th></tr></thead>
                  <tbody className="divide-y divide-slate-100">
                    {displayExpenses.length === 0 ? <tr><td colSpan="7" className="p-8 text-center text-slate-400 font-medium">কোনো রেকর্ড পাওয়া যায়নি</td></tr> : 
                      displayExpenses.map(exp => (
                        <tr key={exp.id} className="hover:bg-slate-50 transition">
                           <td className="p-4 text-slate-600 font-medium">{formatDateEn(new Date(exp.date))}</td>
                           {canApprove && <td className="p-4 font-bold text-slate-800">{exp.userName}</td>}
                           <td className="p-4"><span className={`px-2 py-1 text-[10px] font-bold rounded ${exp.category==='travel' ? 'bg-indigo-100 text-indigo-700' : 'bg-purple-100 text-purple-700'}`}>{exp.category==='travel' ? 'যাতায়াত' : 'অন্যান্য বিল'}</span></td>
                           <td className="p-4 text-slate-700">{exp.description} {exp.rejectReason && <div className="text-[10px] text-red-500 font-bold mt-1 bg-red-50 inline-block px-1 rounded">Note: {exp.rejectReason}</div>}</td>
                           <td className="p-4 font-black text-blue-600 text-lg">৳{exp.amount}</td>
                           <td className="p-4">
                             <span className={`px-3 py-1 text-[10px] uppercase rounded-lg font-bold border ${exp.status === 'পেইড' ? 'bg-green-100 text-green-800 border-green-300' : exp.status === 'অনুমোদিত' ? 'bg-blue-50 text-blue-700 border-blue-200' : exp.status === 'বাতিল' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-orange-50 text-orange-700 border-orange-200'}`}>{exp.status}</span>
                             {exp.approvedAt && <div className="text-[9px] text-blue-600 mt-1 font-semibold whitespace-nowrap"><i className="fa-regular fa-clock"></i> {exp.approvedAt} {exp.approvedBy && `(${exp.approvedBy})`}</div>}
                             {exp.paidAt && <div className="text-[9px] text-green-600 mt-1 font-semibold whitespace-nowrap"><i className="fa-regular fa-clock"></i> {exp.paidAt} {exp.paidBy && `(${exp.paidBy})`}</div>}
                             {exp.rejectedAt && <div className="text-[9px] text-red-600 mt-1 font-semibold whitespace-nowrap"><i className="fa-regular fa-clock"></i> {exp.rejectedAt} {exp.rejectedBy && `(${exp.rejectedBy})`}</div>}
                           </td>
                           <td className="p-4 flex space-x-1">
                             {canApprove && exp.status === 'অপেক্ষমান' && <><button onClick={() => handleApprove(exp.id)} className="bg-blue-100 text-blue-600 hover:bg-blue-600 hover:text-white p-2 rounded-lg" title="Approve"><i className="fa-solid fa-check"></i></button><button onClick={() => handleReject(exp.id)} className="bg-red-100 text-red-600 hover:bg-red-600 hover:text-white p-2 rounded-lg" title="Reject"><i className="fa-solid fa-xmark"></i></button></>}
                             {canApprove && exp.status === 'অনুমোদিত' && <button onClick={() => handleMarkPaid(exp.id)} className="bg-green-100 text-green-700 hover:bg-green-600 hover:text-white px-3 py-2 rounded-lg text-xs font-bold" title="Mark Paid">পে করুন</button>}
                             
                             {user.role === 'admin' && <button onClick={() => handleEditExp(exp)} className="bg-blue-50 text-blue-500 hover:bg-blue-500 hover:text-white p-2 rounded-lg ml-1" title="Edit"><i className="fa-solid fa-pen"></i></button>}
                             {user.role === 'admin' && <button onClick={() => showConfirm('ডিলিট করতে চান?', () => { deleteExpense(exp.id); logAction(`Deleted expense ${exp.id}`); })} className="bg-slate-100 text-slate-500 hover:bg-red-500 hover:text-white p-2 rounded-lg ml-1" title="Delete"><i className="fa-solid fa-trash-can"></i></button>}
                           </td>
                        </tr>
                      ))}
                  </tbody>
                </table>
              </div>

              <div className="md:hidden grid grid-cols-1 gap-4">
                 {displayExpenses.length === 0 ? <div className="p-6 text-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200">কোনো রেকর্ড পাওয়া যায়নি</div> :
                   displayExpenses.map(exp => (
                     <div key={exp.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm relative">
                        {user.role === 'admin' && (
                            <div className="absolute top-4 right-4 flex gap-2">
                                <button onClick={() => handleEditExp(exp)} className="text-blue-400 hover:text-blue-600 p-2"><i className="fa-solid fa-pen"></i></button>
                                <button onClick={() => showConfirm('ডিলিট করতে চান?', () => { deleteExpense(exp.id); logAction(`Deleted expense ${exp.id}`); })} className="text-red-400 hover:text-red-600 p-2"><i className="fa-solid fa-trash-can"></i></button>
                            </div>
                        )}
                        <div className="flex justify-between items-start mb-2 pr-16"><span className="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md">{formatDateEn(new Date(exp.date))}</span><span className={`px-2 py-0.5 text-[9px] rounded-md font-bold uppercase border ${exp.status === 'পেইড' ? 'bg-green-100 text-green-800' : exp.status === 'অনুমোদিত' ? 'bg-blue-50 text-blue-700' : exp.status === 'বাতিল' ? 'bg-red-50 text-red-700' : 'bg-orange-50 text-orange-700'}`}>{exp.status}</span></div>
                        {canApprove && <div className="text-xs font-bold text-blue-600 mb-1">{exp.userName}</div>}
                        <div className="font-black text-slate-800 text-xl mb-1">৳{exp.amount} <span className={`text-[9px] px-1 py-0.5 align-middle rounded font-bold ${exp.category==='travel' ? 'bg-indigo-100 text-indigo-700' : 'bg-purple-100 text-purple-700'}`}>{exp.category==='travel' ? 'যাতায়াত' : 'অন্যান্য বিল'}</span></div>
                        <div className="text-sm text-slate-600 leading-tight mb-2">{exp.description}</div>
                        {exp.rejectReason && <div className="text-xs text-red-600 bg-red-50 p-2 rounded mb-2 font-medium"><i className="fa-solid fa-circle-info mr-1"></i>বাতিলের কারণ: {exp.rejectReason}</div>}
                        
                        {(exp.approvedAt || exp.paidAt || exp.rejectedAt) && (
                          <div className="mb-3">
                             {exp.approvedAt && <div className="text-[10px] text-blue-500 font-semibold"><i className="fa-regular fa-clock"></i> {exp.approvedAt} {exp.approvedBy && `(${exp.approvedBy})`}</div>}
                             {exp.paidAt && <div className="text-[10px] text-green-500 font-semibold mt-0.5"><i className="fa-regular fa-clock"></i> {exp.paidAt} {exp.paidBy && `(${exp.paidBy})`}</div>}
                             {exp.rejectedAt && <div className="text-[10px] text-red-500 font-semibold mt-0.5"><i className="fa-regular fa-clock"></i> {exp.rejectedAt} {exp.rejectedBy && `(${exp.rejectedBy})`}</div>}
                          </div>
                        )}
                        
                        {canApprove && (
                            <div className="flex flex-wrap gap-2 border-t border-slate-100 pt-3">
                                {exp.status === 'অপেক্ষমান' && <><button onClick={() => handleApprove(exp.id)} className="flex-1 bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white py-2 rounded-xl text-xs font-bold transition"><i className="fa-solid fa-check"></i> Approve</button><button onClick={() => handleReject(exp.id)} className="flex-1 bg-red-50 text-red-600 hover:bg-red-600 hover:text-white py-2 rounded-xl text-xs font-bold transition"><i className="fa-solid fa-xmark"></i> Reject</button></>}
                                {exp.status === 'অনুমোদিত' && <button onClick={() => handleMarkPaid(exp.id)} className="flex-1 bg-green-50 text-green-700 hover:bg-green-600 hover:text-white py-2 rounded-xl text-xs font-bold transition"><i className="fa-solid fa-check-double"></i> পে করুন</button>}
                            </div>
                        )}
                     </div>
                   ))}
              </div>
            </div>
          );
        }

        function ReportView({ user, reports, addReport, deleteReport, showConfirm, showAlert, logAction }) {
          const defaultReportFormat = `১. আজকের সম্পন্ন করা কাজসমূহ:\n- \n- \n\n২. অসমাপ্ত কাজ (যদি থাকে):\n- \n\n৩. বিশেষ মন্তব্য বা সমস্যা (যদি থাকে):\n- `;
          const [customers, setCustomers] = useState(''); const [reportText, setReportText] = useState(defaultReportFormat);
          
          const submitReport = (e) => { 
            e.preventDefault(); 
            addReport({ id: Date.now(), userId: user.id, userName: user.name, customers: parseInt(customers) || 0, reportText: reportText, date: formatDateISO(new Date()) }); 
            setCustomers(''); setReportText(defaultReportFormat); showAlert('রিপোর্ট জমা হয়েছে!'); 
          };
          
          const canView = user.role === 'admin' || user.canViewReports;
          const displayReports = (canView ? reports : reports.filter(r => r.userId === user.id))
              .filter(r => r.date && !isNaN(new Date(r.date).getTime()));

          return (
            <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
              <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2"><i className="fa-solid fa-file-lines text-blue-500"></i> ডেইলি রিপোর্ট</h2>
              {user.role !== 'admin' && (
                <form onSubmit={submitReport} className="mb-8 space-y-4 md:space-y-5 bg-blue-50/30 p-5 md:p-6 rounded-2xl border border-blue-100">
                  <div><label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">কাস্টমার সাপোর্ট দিয়েছেন?</label><input type="number" value={customers} onChange={e => setCustomers(e.target.value)} className="w-full md:w-1/3 border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required min="0" placeholder="e.g. 5" /></div>
                  <div><label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">কাজের বিস্তারিত বিবরণ</label><textarea value={reportText} onChange={e => setReportText(e.target.value)} className="w-full border border-slate-300 p-4 rounded-xl h-48 md:h-56 focus:ring-2 focus:ring-blue-500 outline-none resize-none" required></textarea></div>
                  <button type="submit" className="w-full md:w-auto bg-[#1e293b] text-white px-8 py-3.5 rounded-xl hover:bg-slate-800 font-bold shadow-lg active:scale-95 transition-all"><i className="fa-solid fa-paper-plane mr-2"></i> রিপোর্ট জমা দিন</button>
                </form>
              )}
              <div className="space-y-4">
                {displayReports.length === 0 ? <div className="p-8 text-center text-slate-400 border border-dashed border-slate-300 rounded-2xl bg-slate-50 font-medium">কোনো রেকর্ড পাওয়া যায়নি</div> :
                  displayReports.map(rep => (
                    <div key={rep.id} className="border border-slate-200 rounded-2xl p-4 md:p-5 shadow-sm bg-white relative">
                      {user.role === 'admin' && <button onClick={() => showConfirm('রিপোর্টটি ডিলিট করবেন?', () => { deleteReport(rep.id); logAction(`Deleted report ${rep.id}`); })} className="absolute top-4 right-4 text-red-400 hover:text-red-600 bg-red-50 p-2 rounded-lg"><i className="fa-solid fa-trash-can"></i></button>}
                      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 md:mb-4 border-b border-slate-100 pb-3 pr-10 gap-2">
                        <div><div className="font-bold text-slate-800 text-base md:text-lg">{rep.userName}</div><div className="text-xs font-bold text-slate-400 mt-0.5"><i className="fa-regular fa-calendar mr-1"></i> {formatDateEn(new Date(rep.date))}</div></div>
                        <div className="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold border border-blue-100 flex items-center"><i className="fa-solid fa-users mr-2 opacity-70"></i> Customers: <span className="ml-1 text-sm">{rep.customers}</span></div>
                      </div>
                      <p className="text-slate-700 whitespace-pre-wrap leading-relaxed text-sm md:text-base">{rep.reportText}</p>
                    </div>
                  ))}
              </div>
            </div>
          );
        }

        function SalaryView({ user, users, salaries, addSalary, updateSalary, deleteSalary, showAlert, showConfirm, logAction }) {
           const [editingSalId, setEditingSalId] = useState(null);
           const [empId, setEmpId] = useState(''); const [month, setMonth] = useState(''); const [baseSalary, setBaseSalary] = useState('');
           const [additions, setAdditions] = useState(''); const [deductions, setDeductions] = useState(''); const [deductionReason, setDeductionReason] = useState('');
           const [status, setStatus] = useState('পেন্ডিং');

           const submitSalary = (e) => {
              e.preventDefault();
              const emp = users.find(u => u.id.toString() === empId);
              if(!emp) return;
              
              const netSalary = (parseFloat(baseSalary)||0) - (parseFloat(additions)||0) - (parseFloat(deductions)||0);

              if (editingSalId) {
                  updateSalary(editingSalId, { 
                      userId: emp.id, userName: emp.name, month, 
                      baseSalary: parseFloat(baseSalary)||0, additions: parseFloat(additions)||0, 
                      deductions: parseFloat(deductions)||0, deductionReason, status, netSalary 
                  });
                  logAction(`Updated salary for ${emp.name} ${month}`);
                  setEditingSalId(null);
                  showAlert('বেতন সফলভাবে আপডেট করা হয়েছে!');
              } else {
                  addSalary({ 
                      id: Date.now(), userId: emp.id, userName: emp.name, month: month, 
                      baseSalary: parseFloat(baseSalary)||0, additions: parseFloat(additions)||0, 
                      deductions: parseFloat(deductions)||0, deductionReason: deductionReason, 
                      status: status, netSalary: netSalary 
                  });
                  logAction(`Added salary for ${emp.name} ${month}`);
                  showAlert('বেতন সফলভাবে সেভ করা হয়েছে!');
              }
              
              setEmpId(''); setMonth(''); setBaseSalary(''); setAdditions(''); setDeductions(''); setDeductionReason(''); setStatus('পেন্ডিং');
           };

           const handleEditSalary = (sal) => {
              setEditingSalId(sal.id); setEmpId(sal.userId.toString()); setMonth(sal.month);
              setBaseSalary(sal.baseSalary.toString()); setAdditions(sal.additions.toString());
              setDeductions(sal.deductions.toString()); setDeductionReason(sal.deductionReason || '');
              setStatus(sal.status);
              window.scrollTo({ top: 0, behavior: 'smooth' });
           };

           const cancelEdit = () => {
              setEditingSalId(null); setEmpId(''); setMonth(''); setBaseSalary(''); setAdditions(''); setDeductions(''); setDeductionReason(''); setStatus('পেন্ডিং');
           };

           const displaySalaries = user.role === 'admin' ? salaries : salaries.filter(s => s.userId === user.id);

           const handleApprove = (sal) => {
               updateSalary(sal.id, {status: 'অনুমোদিত', approvedAt: getCurrentTimeStr()});
               logAction(`Approved salary for ${sal.userName} ${sal.month}`);
           };
           const handlePaid = (sal) => {
               updateSalary(sal.id, {status: 'পেইড', paidAt: getCurrentTimeStr()});
               logAction(`Marked salary paid for ${sal.userName} ${sal.month}`);
           };

           return (
              <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm space-y-8">
                 <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2"><i className="fa-solid fa-sack-dollar text-blue-500"></i> বেতনের স্ট্যাটাস ও হিস্টোরি</h2>
                 
                 {user.role === 'admin' && (
                    <div className="bg-blue-50/30 p-5 rounded-2xl border border-blue-100">
                      <h3 className="font-bold text-slate-800 mb-4">{editingSalId ? 'বেতন এডিট করুন' : 'বেতন সেটআপ করুন'}</h3>
                      <form onSubmit={submitSalary} className="grid grid-cols-1 md:grid-cols-3 gap-4">
                         <div><label className="block text-xs font-bold mb-2 text-slate-700">স্টাফ নির্বাচন করুন</label><select required value={empId} onChange={e=>setEmpId(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white"><option value="">-- নির্বাচন করুন --</option>{users.filter(u=>u.role!=='admin').map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
                         <div><label className="block text-xs font-bold mb-2 text-slate-700">মাস</label><input type="month" required value={month} onChange={e=>setMonth(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500" /></div>
                         <div><label className="block text-xs font-bold mb-2 text-slate-700">স্ট্যাটাস</label><select value={status} onChange={e=>setStatus(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white"><option value="পেন্ডিং">পেন্ডিং</option><option value="অনুমোদিত">অনুমোদিত</option><option value="পেইড">পেইড</option></select></div>
                         
                         <div><label className="block text-xs font-bold mb-2 text-slate-700">মূল বেতন (৳)</label><input type="number" required value={baseSalary} onChange={e=>setBaseSalary(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="0" /></div>
                         <div><label className="block text-xs font-bold mb-2 text-slate-700">অগ্রিম/বেতন বাবদ জমা (-)</label><input type="number" value={additions} onChange={e=>setAdditions(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="0" /></div>
                         <div><label className="block text-xs font-bold mb-2 text-slate-700">বেতন কর্তন (-)</label><input type="number" value={deductions} onChange={e=>setDeductions(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="0" /></div>
                         
                         <div className="md:col-span-2"><label className="block text-xs font-bold mb-2 text-slate-700">কর্তনের কারণ</label><input type="text" value={deductionReason} onChange={e=>setDeductionReason(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="যদি থাকে..." /></div>
                         <div className="md:col-span-1 flex items-end gap-2">
                             <button type="submit" className="w-full bg-blue-600 text-white px-4 py-3 rounded-xl hover:bg-blue-700 font-bold active:scale-95 transition-all">{editingSalId ? 'আপডেট করুন' : 'সেভ করুন'}</button>
                             {editingSalId && <button type="button" onClick={cancelEdit} className="w-1/2 bg-slate-200 text-slate-700 px-4 py-3 rounded-xl font-bold hover:bg-slate-300 transition-all">Cancel</button>}
                         </div>
                      </form>
                    </div>
                 )}

                 <div>
                    <h3 className="text-lg font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2"><i className="fa-solid fa-clock-rotate-left mr-2 text-slate-500"></i> হিস্টোরি (মাসিক)</h3>
                    <div className="space-y-4">
                       {displaySalaries.length === 0 ? <div className="p-8 text-center text-slate-400 border border-dashed border-slate-300 rounded-2xl bg-slate-50 font-medium">কোনো বেতনের হিস্টোরি পাওয়া যায়নি</div> :
                          displaySalaries.sort((a,b) => (b.month||'').localeCompare(a.month||'')).map(sal => (
                             <div key={sal.id} className="bg-white border border-slate-200 rounded-xl p-4 md:p-5 shadow-sm relative">
                                {user.role === 'admin' && (
                                   <div className="absolute top-4 right-4 flex gap-2">
                                      <button onClick={() => handleEditSalary(sal)} className="text-blue-500 hover:text-blue-700 bg-blue-50 p-2 rounded-lg"><i className="fa-solid fa-pen"></i></button>
                                      <button onClick={() => showConfirm('এই রেকর্ড ডিলিট করবেন?', () => { deleteSalary(sal.id); logAction(`Deleted salary ${sal.id}`); })} className="text-red-400 hover:text-red-600 bg-red-50 p-2 rounded-lg"><i className="fa-solid fa-trash-can"></i></button>
                                   </div>
                                )}
                                <div className="flex justify-between items-start mb-4 border-b border-slate-100 pb-3 pr-24">
                                   <div><span className="bg-slate-100 text-slate-700 px-3 py-1 rounded-lg text-sm font-bold tracking-wide mr-2"><i className="fa-regular fa-calendar-days mr-1"></i> {sal.month}</span>{user.role === 'admin' && <span className="font-bold text-blue-600 text-sm">{sal.userName}</span>}</div>
                                   <div className="text-right">
                                       <span className={`px-3 py-1 rounded-lg text-xs font-bold ${sal.status === 'পেইড' ? 'bg-green-100 text-green-700' : sal.status === 'অনুমোদিত' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700'}`}>{sal.status}</span>
                                       {sal.approvedAt && <div className="text-[9px] text-blue-600 mt-1.5 font-bold"><i className="fa-regular fa-clock"></i> অনুমোদিত: {sal.approvedAt}</div>}
                                       {sal.paidAt && <div className="text-[9px] text-green-600 mt-1 font-bold"><i className="fa-regular fa-clock"></i> পেইড: {sal.paidAt}</div>}
                                   </div>
                                </div>
                                
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                                   <div className="bg-slate-50 p-3 rounded-lg"><p className="text-[10px] text-slate-500 font-bold mb-1">মূল বেতন</p><p className="font-bold text-slate-800">৳{sal.baseSalary}</p></div>
                                   <div className="bg-indigo-50 p-3 rounded-lg"><p className="text-[10px] text-indigo-500 font-bold mb-1">অগ্রিম/বেতন বাবদ জমা (-)</p><p className="font-bold text-indigo-700">৳{sal.additions}</p></div>
                                   <div className="bg-red-50 p-3 rounded-lg"><p className="text-[10px] text-red-500 font-bold mb-1">বেতন কর্তন (-)</p><p className="font-bold text-red-600">৳{sal.deductions}</p></div>
                                   <div className="bg-green-50 p-3 rounded-lg border border-green-100"><p className="text-[10px] text-green-600 font-bold mb-1">প্রাপ্য বেতন (Net)</p><p className="text-lg font-black text-green-700 leading-none">৳{sal.netSalary}</p></div>
                                </div>
                                {sal.deductionReason && <div className="mt-3 text-xs bg-red-50 text-red-600 p-2 rounded-lg font-medium"><i className="fa-solid fa-circle-info mr-1"></i> কর্তনের কারণ: {sal.deductionReason}</div>}
                                
                                {user.role === 'admin' && sal.status !== 'পেইড' && (
                                   <div className="mt-4 flex gap-2">
                                      {sal.status === 'পেন্ডিং' && <button onClick={()=>handleApprove(sal)} className="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white px-4 py-2 rounded-lg text-xs font-bold transition">অনুমোদন দিন</button>}
                                      {sal.status === 'অনুমোদিত' && <button onClick={()=>handlePaid(sal)} className="bg-green-50 text-green-700 hover:bg-green-600 hover:text-white px-4 py-2 rounded-lg text-xs font-bold transition">পেমেন্ট সম্পন্ন (Mark Paid)</button>}
                                   </div>
                                )}
                             </div>
                          ))
                       }
                    </div>
                 </div>
              </div>
           );
        }

        function EmployeesView({ users, addUser, updateUser, deleteUser, showConfirm, showAlert, logAction }) {
          const [editingId, setEditingId] = useState(null);
          const [name, setName] = useState(''); const [loginId, setLoginId] = useState(''); const [password, setPassword] = useState(''); const [designation, setDesignation] = useState('');
          const [canInvest, setCanInvest] = useState(false);
          const [canSubmitExp, setCanSubmitExp] = useState(true);
          const [canApproveExp, setCanApproveExp] = useState(false);
          const [canViewReports, setCanViewReports] = useState(false);
          const [canSubmitAttendance, setCanSubmitAttendance] = useState(false);
          const [canApproveLeave, setCanApproveLeave] = useState(false);

          const submitUser = (e) => {
            e.preventDefault();
            if (editingId) { 
                updateUser(editingId, { name, loginId, password, designation, canInvest, canSubmitExp, canApproveExp, canViewReports, canSubmitAttendance, canApproveLeave }); 
                logAction(`Updated staff: ${name}`);
                setEditingId(null); showAlert('প্রোফাইল আপডেট হয়েছে!'); 
            } else { 
                addUser({ id: Date.now(), name, loginId, password, designation, role: 'staff', avatar: null, canInvest, canSubmitExp, canApproveExp, canViewReports, canSubmitAttendance, canApproveLeave }); 
                showAlert('নতুন স্টাফ যুক্ত হয়েছে!'); 
            }
            setName(''); setLoginId(''); setPassword(''); setDesignation(''); setCanInvest(false); setCanSubmitExp(true); setCanApproveExp(false); setCanViewReports(false); setCanSubmitAttendance(false); setCanApproveLeave(false);
          };

          const handleEdit = (u) => { setEditingId(u.id); setName(u.name); setLoginId(u.loginId); setPassword(u.password); setDesignation(u.designation); setCanInvest(u.canInvest || false); setCanSubmitExp(u.hasOwnProperty('canSubmitExp') ? u.canSubmitExp : true); setCanApproveExp(u.canApproveExp || false); setCanViewReports(u.canViewReports || false); setCanSubmitAttendance(u.canSubmitAttendance || false); setCanApproveLeave(u.canApproveLeave || false); window.scrollTo({ top: 0, behavior: 'smooth' }); };
          const cancelEdit = () => { setEditingId(null); setName(''); setLoginId(''); setPassword(''); setDesignation(''); setCanInvest(false); setCanSubmitExp(true); setCanApproveExp(false); setCanViewReports(false); setCanSubmitAttendance(false); setCanApproveLeave(false); };

          return (
            <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
              <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2"><i className="fa-solid fa-users-gear text-blue-500"></i> স্টাফ প্রোফাইল</h2>
              <form onSubmit={submitUser} className="mb-8 bg-slate-50 p-5 md:p-6 rounded-2xl border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5">
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">নাম</label><input required value={name} onChange={e=>setName(e.target.value)} className="w-full border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Full Name" /></div>
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">লগইন আইডি</label><input required value={loginId} onChange={e=>setLoginId(e.target.value)} className="w-full border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Phone/Email" /></div>
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">পাসওয়ার্ড</label><input required value={password} onChange={e=>setPassword(e.target.value)} className="w-full border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Password" /></div>
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">পদবী</label><input required value={designation} onChange={e=>setDesignation(e.target.value)} className="w-full border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Technician" /></div>
                
                <div className="md:col-span-2 mt-2 flex flex-col gap-3 border p-4 rounded-xl bg-white border-blue-100">
                    <p className="text-xs font-bold text-slate-400 mb-2 border-b pb-1">অ্যাক্সেস কন্ট্রোল (Access Control)</p>
                    <label className="flex items-center gap-2 cursor-pointer font-bold text-slate-700 text-sm w-max">
                        <input type="checkbox" checked={canSubmitAttendance} onChange={e=>setCanSubmitAttendance(e.target.checked)} className="w-4 h-4 accent-blue-600" />
                        এই স্টাফকে 'উপস্থিতি' অপশনের অ্যাক্সেস দিন
                    </label>
                    <label className="flex items-center gap-2 cursor-pointer font-bold text-slate-700 text-sm w-max">
                        <input type="checkbox" checked={canApproveLeave} onChange={e=>setCanApproveLeave(e.target.checked)} className="w-4 h-4 accent-blue-600" />
                        এই স্টাফকে 'ছুটি' অনুমোদনের অ্যাক্সেস দিন
                    </label>
                    <label className="flex items-center gap-2 cursor-pointer font-bold text-slate-700 text-sm w-max">
                        <input type="checkbox" checked={canViewReports} onChange={e=>setCanViewReports(e.target.checked)} className="w-4 h-4 accent-blue-600" />

                  <tbody className="divide-y divide-slate-100">
                    {users.map(u => (

                         <td className="p-4 text-blue-600 font-medium">{u.loginId}</td><td className="p-4 text-slate-500 font-mono text-sm bg-slate-50/50 rounded">{u.password}</td><td className="p-4 text-slate-600 text-sm">{u.designation}</td><td className="p-4"><span className={`px-2 py-1 text-[10px] font-bold uppercase rounded-md ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-slate-200 text-slate-600'}`}>{u.role === 'admin' ? 'এডমিন' : 'স্টাফ'}</span></td>

                      </tr>
                    ))}

                </table>

              <div className="md:hidden grid grid-cols-1 gap-4">

        function PaymentsView({ user, payments, addPayment, deletePayment, users, expenses, showAlert, showConfirm, logAction }) {
          const [amount, setAmount] = useState(''); const [note, setNote] = useState('');
          
          const submitPayment = (e) => {
            e.preventDefault();
            const paymentUser = user.role === 'admin' ? users.find(u => u.id.toString() === empId) : user;
            if(!paymentUser) return;
            const newPay = { id: Date.now(), userId: paymentUser.id, userName: paymentUser.name, amount: parseFloat(amount), note: note, date: formatDateISO(new Date()), paidAt: getCurrentTimeStr() };
            addPayment(newPay);
            setAmount(''); setNote('');
            if (user.role === 'admin') setEmpId('');
            showAlert('পেমেন্ট সফলভাবে এন্ট্রি হয়েছে!');
          };

          const [empId, setEmpId] = useState('');

          const canManageAll = user.role === 'admin';
          const displayPayments = canManageAll ? payments : payments.filter(p => p.userId === user.id);

          const handleDelete = (id) => {
              showConfirm('পেমেন্ট ডিলিট করবেন?', () => {
                  deletePayment(id);
                  logAction(`Deleted payment ${id}`);
              });
          };

          return (
            <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
              <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2"><i className="fa-solid fa-wallet text-blue-500"></i> পেমেন্ট</h2>
              
              <form onSubmit={submitPayment} className="mb-8 md:mb-10 bg-slate-50 p-5 md:p-6 rounded-2xl border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5 items-end">
                {canManageAll && (
                    <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">স্টাফ নির্বাচন করুন</label><select required value={empId} onChange={e=>setEmpId(e.target.value)} className="w-full border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white outline-none"><option value="">-- নির্বাচন করুন --</option>{users.filter(u=>u.role!=='admin').map(u => <option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
                )}
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">পরিমাণ (৳)</label><div className="relative"><span className="absolute left-4 top-3.5 text-slate-400 font-bold">৳</span><input type="number" required value={amount} onChange={e=>setAmount(e.target.value)} className="w-full pl-8 pr-4 py-3.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0.00" /></div></div>
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">নোট (কীসের পেমেন্ট)</label><input required value={note} onChange={e=>setNote(e.target.value)} className="w-full px-4 py-3.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Short note..." /></div>
                <div className="md:col-span-3 mt-2"><button type="submit" className="w-full md:w-auto bg-[#1e293b] text-white px-8 py-3.5 rounded-xl hover:bg-slate-800 font-bold shadow-lg active:scale-95 transition-all"><i className="fa-solid fa-plus mr-2"></i> পেমেন্ট এন্ট্রি করুন</button></div>
              </form>

              <h3 className="text-lg font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2"><i className="fa-solid fa-clock-rotate-left mr-2 text-slate-500"></i> {canManageAll ? 'সকল পেমেন্ট' : 'আপনার পেমেন্ট'}</h3>
              <div className="hidden md:block overflow-x-auto rounded-xl border border-slate-200">
                <table className="w-full text-left border-collapse"><thead><tr className="bg-slate-50 text-slate-500 uppercase text-xs tracking-wider border-b border-slate-200"><th className="p-4 font-bold">তারিখ</th><th className="p-4 font-bold">নাম</th><th className="p-4 font-bold">নোট</th><th className="p-4 font-bold">পরিমাণ</th><th className="p-4 font-bold">অ্যাকশন</th></tr></thead>
                  <tbody className="divide-y divide-slate-100">{displayPayments.length === 0 ? <tr><td colSpan="5" className="p-8 text-center text-slate-400 font-medium">কোনো রেকর্ড পাওয়া যায়নি</td></tr> : displayPayments.map(p => (<tr key={p.id} className="hover:bg-slate-50 transition"><td className="p-4 text-slate-500 font-medium">{formatDateEn(new Date(p.date))} <div className="text-[10px] text-green-600 mt-1 font-bold"><i className="fa-regular fa-clock"></i> পেইড: {p.paidAt}</div></td><td className="p-4 font-bold text-slate-800">{p.userName}</td><td className="p-4 text-slate-600 text-sm">{p.note}</td><td className="p-4 font-black text-green-600 text-lg">৳ {p.amount}</td><td className="p-4"><button onClick={() => handleDelete(p.id)} className="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white w-8 h-8 rounded-lg"><i className="fa-solid fa-trash-can text-sm"></i></button></td></tr>))}</tbody>
                </table>
              </div>
              <div className="md:hidden grid grid-cols-1 gap-3">
                 {displayPayments.length === 0 ? <div className="p-6 text-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200">কোনো রেকর্ড পাওয়া যায়নি</div> : displayPayments.map(p => (
                   <div key={p.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between relative">
                      {user.role === 'admin' && <button onClick={() => handleDelete(p.id)} className="absolute top-4 right-4 text-red-400 hover:text-red-600 p-2"><i className="fa-solid fa-trash-can"></i></button>}
                      <div className="pr-10"><h4 className="font-bold text-slate-800 text-sm mb-0.5">{p.userName}</h4><div className="text-xs text-slate-500 mb-1.5"><i className="fa-regular fa-calendar mr-1"></i> {formatDateEn(new Date(p.date))}</div><span className="bg-slate-100 text-slate-600 text-[10px] font-bold px-2 py-0.5 rounded-md border border-slate-200">{p.note}</span><div className="text-[9px] text-green-600 mt-1.5 font-bold"><i className="fa-regular fa-clock"></i> পেইড: {p.paidAt}</div></div>
                      <div className="font-black text-green-600 text-xl mr-8">৳{p.amount}</div>
                   </div>
                 ))}
              </div>
            </div>
          );
        }

        function InvestView({ user, investments, addInvestment, updateInvestment, deleteInvestment, showConfirm, showAlert, logAction }) {
            const [editingId, setEditingId] = useState(null);
            const [amount, setAmount] = useState('');
            const [reason, setReason] = useState('');
            const [invDate, setInvDate] = useState(() => formatDateISO(new Date()));

            const submitInvest = (e) => {
                e.preventDefault();
                if(editingId) {
                    updateInvestment(editingId, { amount: parseFloat(amount), reason, date: invDate });
                    logAction(`Updated investment ${editingId}`);
                    setEditingId(null); showAlert('ইনভেস্টমেন্ট আপডেট হয়েছে!');
                } else {
                    addInvestment({ id: Date.now(), userId: user.id, userName: user.name, amount: parseFloat(amount), reason, date: invDate, timestamp: getCurrentTimeStr() });
                    showAlert('ইনভেস্টমেন্ট যুক্ত হয়েছে!');
                }
                setAmount(''); setReason(''); setInvDate(formatDateISO(new Date()));
            };

            const handleEdit = (inv) => {
                setEditingId(inv.id); setAmount(inv.amount); setReason(inv.reason); setInvDate(inv.date);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const displayInvestments = user.role === 'admin' ? investments : investments.filter(i => i.userId === user.id);
            const totalInvest = displayInvestments.reduce((sum, i) => sum + (i.amount || 0), 0);

            return (
                <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
                  <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2">
                    <i className="fa-solid fa-chart-line text-blue-500"></i> ইনভেস্টমেন্ট
                  </h2>

                  <div className="mb-6 bg-indigo-50 border border-indigo-200 p-5 rounded-2xl shadow-sm inline-block min-w-[250px] w-full md:w-auto">
                     <p className="text-indigo-800 text-xs md:text-sm font-bold uppercase mb-1">মোট ইনভেস্টমেন্ট</p>
                     <p className="text-2xl md:text-3xl font-black text-indigo-600">৳{totalInvest}</p>
                  </div>

                  <form onSubmit={submitInvest} className="mb-8 bg-slate-50 p-5 md:p-6 rounded-2xl border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5 items-end">

                    <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">পরিমাণ (৳)</label><div className="relative"><span className="absolute left-4 top-3.5 text-slate-400 font-bold">৳</span><input type="number" required value={amount} onChange={e=>setAmount(e.target.value)} className="w-full pl-8 pr-4 py-3.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0.00" /></div></div>
                    <div className="md:col-span-1"><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">কীসের জন্য</label><input required value={reason} onChange={e=>setReason(e.target.value)} className="w-full px-4 py-3.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="বিবরণ..." /></div>
                    <div className="md:col-span-3 mt-2 flex gap-3">
                       <button type="submit" className="w-full md:w-auto bg-[#1e293b] text-white px-8 py-3.5 rounded-xl hover:bg-slate-800 font-bold shadow-lg active:scale-95 transition-all"><i className={`fa-solid ${editingId ? 'fa-check' : 'fa-plus'} mr-2`}></i> {editingId ? 'আপডেট করুন' : 'ইনভেস্ট এন্ট্রি করুন'}</button>
                       {editingId && <button type="button" onClick={()=>{setEditingId(null); setAmount(''); setReason('');}} className="px-6 py-3.5 rounded-xl bg-slate-200 text-slate-700 font-bold hover:bg-slate-300 transition-all">বাতিল</button>}
                    </div>
                  </form>

                  <div className="hidden md:block overflow-x-auto rounded-xl border border-slate-200">
                    <table className="w-full text-left border-collapse"><thead><tr className="bg-slate-50 text-slate-500 uppercase text-xs tracking-wider border-b border-slate-200"><th className="p-4 font-bold">তারিখ</th><th className="p-4 font-bold">নাম</th><th className="p-4 font-bold">বিবরণ</th><th className="p-4 font-bold">পরিমাণ</th>{user.role === 'admin' && <th className="p-4 font-bold text-center">অ্যাকশন</th>}</tr></thead>
                      <tbody className="divide-y divide-slate-100">{displayInvestments.length === 0 ? <tr><td colSpan={user.role === 'admin' ? 5 : 4} className="p-8 text-center text-slate-400 font-medium">কোনো রেকর্ড পাওয়া যায়নি</td></tr> : displayInvestments.map(inv => (<tr key={inv.id} className="hover:bg-slate-50 transition"><td className="p-4 text-slate-500 font-medium">{formatDateEn(new Date(inv.date))}</td><td className="p-4 font-bold text-slate-800">{inv.userName}</td><td className="p-4 text-slate-600 text-sm">{inv.reason}</td><td className="p-4 font-black text-indigo-600 text-lg">৳ {inv.amount}</td>{user.role === 'admin' && <td className="p-4 text-center space-x-2"><button onClick={() => handleEdit(inv)} className="bg-blue-50 text-blue-500 hover:bg-blue-500 hover:text-white w-8 h-8 rounded-lg transition"><i className="fa-solid fa-pen text-sm"></i></button><button onClick={() => showConfirm('ডিলিট করতে চান?', () => { deleteInvestment(inv.id); logAction(`Deleted investment ${inv.id}`); })} className="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white w-8 h-8 rounded-lg transition"><i className="fa-solid fa-trash-can text-sm"></i></button></td>}</tr>))}</tbody>
                    </table>
                  </div>
                  <div className="md:hidden grid grid-cols-1 gap-3">
                     {displayInvestments.length === 0 ? <div className="p-6 text-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200">কোনো রেকর্ড পাওয়া যায়নি</div> : displayInvestments.map(inv => (
                       <div key={inv.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col relative">
                          {user.role === 'admin' && <div className="absolute top-4 right-4 flex gap-2"><button onClick={() => handleEdit(inv)} className="text-blue-400 hover:text-blue-600 p-2"><i className="fa-solid fa-pen"></i></button><button onClick={() => showConfirm('ডিলিট করতে চান?', () => { deleteInvestment(inv.id); logAction(`Deleted investment ${inv.id}`); })} className="text-red-400 hover:text-red-600 p-2"><i className="fa-solid fa-trash-can"></i></button></div>}
                          <div className="mb-2 pr-16"><h4 className="font-bold text-slate-800 text-sm mb-0.5">{inv.userName}</h4><div className="text-xs text-slate-500 mb-1.5"><i className="fa-regular fa-calendar mr-1"></i> {formatDateEn(new Date(inv.date))}</div><span className="bg-slate-100 text-slate-600 text-[10px] font-bold px-2 py-0.5 rounded-md border border-slate-200">{inv.reason}</span></div>
                          <div className="font-black text-indigo-600 text-xl mt-2 border-t border-slate-100 pt-2">৳{inv.amount}</div>
                       </div>
                     ))}
                  </div>
                </div>
            );
        }

        function LogsView({ logs }) {
            const [search, setSearch] = useState('');
            const filtered = search ? logs.filter(l => l.action.toLowerCase().includes(search.toLowerCase()) || l.userName.toLowerCase().includes(search.toLowerCase())) : logs;
            return (
                <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
                    <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2"><i className="fa-solid fa-clipboard-list text-blue-500"></i> লগ</h2>
                    <div className="mb-4">
                        <input type="text" placeholder="সার্চ..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full md:w-1/2 border p-3 rounded-xl" />
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead><tr className="bg-slate-50 text-xs uppercase"><th className="p-2">Time</th><th className="p-2">User</th><th className="p-2">Action</th></tr></thead>
                            <tbody className="divide-y">
                                {filtered.map(l => (
                                    <tr key={l.id}>
                                        <td className="p-2 text-xs">{new Date(l.timestamp).toLocaleString('en-US')}</td>
                                        <td className="p-2 font-bold">{l.userName}</td>
                                        <td className="p-2 text-sm">{l.action}</td>
                                    </tr>
                                ))}
                                {filtered.length === 0 && <tr><td colSpan="3" className="p-4 text-center">কোনো লগ নেই</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ==========================================
        // Utilities (Clocks & Calendar)
        // ==========================================
        function RealTimeClock() {
          const [time, setTime] = useState(new Date());
          useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
          return <span>{new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true }).format(time)}</span>;
        }

        function AnalogClock() {
          const [time, setTime] = useState(new Date());
          useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
          const secDeg = time.getSeconds() * 6, minDeg = time.getMinutes() * 6 + time.getSeconds() * 0.1, hrDeg = (time.getHours() % 12) * 30 + time.getMinutes() * 0.5;
          return (
            <div className="relative w-[150px] h-[150px] md:w-48 md:h-48 rounded-full border-[6px] border-slate-200 shadow-[inset_0_2px_15px_rgba(0,0,0,0.1)] bg-white flex items-center justify-center">
              <span className="absolute top-2 text-xs md:text-sm font-bold text-slate-400">12</span><span className="absolute right-3 text-xs md:text-sm font-bold text-slate-400">3</span><span className="absolute bottom-2 text-xs md:text-sm font-bold text-slate-400">6</span><span className="absolute left-3 text-xs md:text-sm font-bold text-slate-400">9</span>
              <div className="absolute w-1 md:w-1.5 h-10 md:h-12 bg-slate-800 rounded-full origin-bottom" style={{ transform: `translateY(-50%) rotate(${hrDeg}deg)` }}></div>
              <div className="absolute w-0.5 md:w-1 h-14 md:h-16 bg-blue-600 rounded-full origin-bottom" style={{ transform: `translateY(-50%) rotate(${minDeg}deg)` }}></div>
              <div className="absolute w-[1px] md:w-0.5 h-16 md:h-20 bg-red-500 rounded-full origin-bottom" style={{ transform: `translateY(-50%) rotate(${secDeg}deg)` }}></div>
              <div className="w-3 h-3 md:w-4 md:h-4 bg-slate-800 border-2 border-white rounded-full z-10 absolute shadow-sm"></div>
            </div>
          );
        }

        function MiniCalendar() {
          const today = new Date();
          const monthYear = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(today);
          const daysInWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
          const year = today.getFullYear(), month = today.getMonth();
          const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
          
          return (
            <div className="w-full">
              <div className="flex justify-between items-center mb-4 md:mb-5 pb-3 border-b border-slate-600">
                <button className="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-full text-xs md:text-sm hover:bg-blue-600 transition"><i className="fa-solid fa-chevron-left"></i></button>
                <span className="text-lg md:text-xl font-bold tracking-wide">{monthYear}</span>
                <button className="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-full text-xs md:text-sm hover:bg-blue-600 transition"><i className="fa-solid fa-chevron-right"></i></button>
              </div>
              <div className="overflow-x-auto w-full pb-2 scrollbar-hide">
                <div className="grid grid-cols-7 gap-1 md:gap-2 text-center text-xs md:text-sm min-w-[240px]">
                  {daysInWeek.map(d => <div key={d} className="text-blue-400 font-bold py-1 text-[10px] md:text-xs uppercase">{d}</div>)}
                  {Array(firstDay).fill(null).map((_, i) => <div key={`blank-${i}`} className="py-1 md:py-2"></div>)}
                  {Array.from({length: daysInMonth}, (_, i) => i + 1).map(d => (
                    <div key={d} className={`py-1 md:py-1.5 rounded-lg flex items-center justify-center transition-colors ${d === today.getDate() ? 'bg-blue-500 text-white font-bold shadow-lg shadow-blue-500/40' : 'hover:bg-slate-700 text-slate-300'}`}>
                      {d}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
