                      <div className="text-sm space-y-1.5 text-slate-600"><div className="flex justify-between"><span className="text-slate-400 text-xs">ID:</span> <span className="font-medium text-blue-600">{u.loginId}</span></div><div className="flex justify-between"><span className="text-slate-400 text-xs">Pass:</span> <span className="font-mono bg-slate-100 px-1.5 rounded">{u.password}</span></div><div className="flex justify-between"><span className="text-slate-400 text-xs">Desig:</span> <span>{u.designation}</span></div></div>
                   </div>
                 ))}
              </div>
            </div>
          );
        }

        function PaymentsView({ users, payments, addPayment, expenses }) {
          const [empId, setEmpId] = useState(''); const [amount, setAmount] = useState(''); const [note, setNote] = useState('');
          const submitPayment = (e) => {
            e.preventDefault();
            const emp = users.find(u => u.id.toString() === empId);
            if(!emp) return;
            addPayment({ id: Date.now(), userId: emp.id, userName: emp.name, amount: parseFloat(amount), note: note, date: new Date().toLocaleDateString('bn-BD'), paidAt: getCurrentTimeStr() });
            setAmount(''); setNote('');
          };

          const totalTravelPaid = expenses.filter(e => e.status === 'পেইড' && e.category === 'travel').reduce((sum, e) => sum + e.amount, 0);
          const totalOtherPaid = expenses.filter(e => e.status === 'পেইড' && e.category === 'other').reduce((sum, e) => sum + e.amount, 0);
          const totalPay = payments.reduce((sum, p) => sum + p.amount, 0);

          return (
            <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
              <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2"><i className="fa-solid fa-wallet text-blue-500"></i> পেমেন্ট</h2>
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8 md:mb-10">
                <div className="bg-indigo-50 border border-indigo-200 p-5 md:p-6 rounded-2xl shadow-sm"><p className="text-indigo-800 text-xs md:text-sm font-bold uppercase mb-1">মোট পেইড (যাতায়াত)</p><p className="text-2xl md:text-3xl font-black text-indigo-600">৳{totalTravelPaid}</p></div>
                <div className="bg-purple-50 border border-purple-200 p-5 md:p-6 rounded-2xl shadow-sm"><p className="text-purple-800 text-xs md:text-sm font-bold uppercase mb-1">মোট পেইড (অন্যান্য বিল)</p><p className="text-2xl md:text-3xl font-black text-purple-600">৳{totalOtherPaid}</p></div>
                <div className="bg-green-50 border border-green-200 p-5 md:p-6 rounded-2xl shadow-sm"><p className="text-green-800 text-xs md:text-sm font-bold uppercase mb-1">পেমেন্ট প্রদান</p><p className="text-2xl md:text-3xl font-black text-green-600">৳{totalPay}</p></div>
              </div>
              
              <form onSubmit={submitPayment} className="mb-8 md:mb-10 bg-slate-50 p-5 md:p-6 rounded-2xl border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5 items-end">
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">স্টাফ নির্বাচন করুন</label><select required value={empId} onChange={e=>setEmpId(e.target.value)} className="w-full border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white outline-none"><option value="">-- নির্বাচন করুন --</option>{users.filter(u=>u.role==='employee').map(u => <option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">পরিমাণ (৳)</label><div className="relative"><span className="absolute left-4 top-3.5 text-slate-400 font-bold">৳</span><input type="number" required value={amount} onChange={e=>setAmount(e.target.value)} className="w-full pl-8 pr-4 py-3.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0.00" /></div></div>
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">নোট (কীসের পেমেন্ট)</label><input required value={note} onChange={e=>setNote(e.target.value)} className="w-full px-4 py-3.5 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Short note..." /></div>
                <div className="md:col-span-3 mt-2"><button type="submit" className="w-full md:w-auto bg-[#1e293b] text-white px-8 py-3.5 rounded-xl hover:bg-slate-800 font-bold shadow-lg active:scale-95 transition-all"><i className="fa-solid fa-plus mr-2"></i> পেমেন্ট এন্ট্রি করুন</button></div>
              </form>

              <h3 className="text-lg font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2"><i className="fa-solid fa-clock-rotate-left mr-2 text-slate-500"></i> হিস্টোরি (সকল পেমেন্ট)</h3>
              <div className="hidden md:block overflow-x-auto rounded-xl border border-slate-200">
                <table className="w-full text-left border-collapse"><thead><tr className="bg-slate-50 text-slate-500 uppercase text-xs tracking-wider border-b border-slate-200"><th className="p-4 font-bold">তারিখ</th><th className="p-4 font-bold">নাম</th><th className="p-4 font-bold">নোট</th><th className="p-4 font-bold">পরিমাণ</th></tr></thead>
                  <tbody className="divide-y divide-slate-100">{payments.length === 0 ? <tr><td colSpan="4" className="p-8 text-center text-slate-400 font-medium">কোনো রেকর্ড পাওয়া যায়নি</td></tr> : payments.map(p => (<tr key={p.id} className="hover:bg-slate-50 transition"><td className="p-4 text-slate-500 font-medium">{p.date} <div className="text-[10px] text-green-600 mt-1 font-bold"><i className="fa-regular fa-clock"></i> পেইড: {p.paidAt}</div></td><td className="p-4 font-bold text-slate-800">{p.userName}</td><td className="p-4 text-slate-600 text-sm">{p.note}</td><td className="p-4 font-black text-green-600 text-lg">৳ {p.amount}</td></tr>))}</tbody>
                </table>
              </div>
              <div className="md:hidden grid grid-cols-1 gap-3">
                 {payments.length === 0 ? <div className="p-6 text-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200">কোনো রেকর্ড পাওয়া যায়নি</div> : payments.map(p => (
                   <div key={p.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between">
                      <div><h4 className="font-bold text-slate-800 text-sm mb-0.5">{p.userName}</h4><div className="text-xs text-slate-500 mb-1.5"><i className="fa-regular fa-calendar mr-1"></i> {p.date}</div><span className="bg-slate-100 text-slate-600 text-[10px] font-bold px-2 py-0.5 rounded-md border border-slate-200">{p.note}</span><div className="text-[9px] text-green-600 mt-1.5 font-bold"><i className="fa-regular fa-clock"></i> পেইড: {p.paidAt}</div></div>
                      <div className="font-black text-green-600 text-xl">৳{p.amount}</div>
                   </div>
                 ))}
              </div>
            </div>
          );
        }

        function RealTimeClock() {
          const [time, setTime] = useState(new Date());
          useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
          return <span>{new Intl.DateTimeFormat('bn-BD', { hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true }).format(time)}</span>;
        }

        function AnalogClock() {
          const [time, setTime] = useState(new Date());
          useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
          const secDeg = time.getSeconds() * 6, minDeg = time.getMinutes() * 6 + time.getSeconds() * 0.1, hrDeg = (time.getHours() % 12) * 30 + time.getMinutes() * 0.5;
          return (
            <div className="relative w-[150px] h-[150px] md:w-48 md:h-48 rounded-full border-[6px] border-slate-200 shadow-[inset_0_2px_15px_rgba(0,0,0,0.1)] bg-white flex items-center justify-center">
              <span className="absolute top-2 text-xs md:text-sm font-bold text-slate-400">১২</span><span className="absolute right-3 text-xs md:text-sm font-bold text-slate-400">৩</span><span className="absolute bottom-2 text-xs md:text-sm font-bold text-slate-400">৬</span><span className="absolute left-3 text-xs md:text-sm font-bold text-slate-400">৯</span>
              <div className="absolute w-1 md:w-1.5 h-10 md:h-12 bg-slate-800 rounded-full origin-bottom" style={{ transform: `translateY(-50%) rotate(${hrDeg}deg)` }}></div>
              <div className="absolute w-0.5 md:w-1 h-14 md:h-16 bg-blue-600 rounded-full origin-bottom" style={{ transform: `translateY(-50%) rotate(${minDeg}deg)` }}></div>
              <div className="absolute w-[1px] md:w-0.5 h-16 md:h-20 bg-red-500 rounded-full origin-bottom" style={{ transform: `translateY(-50%) rotate(${secDeg}deg)` }}></div>
              <div className="w-3 h-3 md:w-4 md:h-4 bg-slate-800 border-2 border-white rounded-full z-10 absolute shadow-sm"></div>
            </div>
          );
        }

        function BanglaCalendar() {
          const today = new Date();
          const monthYear = new Intl.DateTimeFormat('bn-BD', { month: 'long', year: 'numeric' }).format(today);
          const daysInWeek = ['রবি', 'সোম', 'মঙ্গল', 'বুধ', 'বৃহঃ', 'শুক্র', 'শনি'];
          const year = today.getFullYear(), month = today.getMonth();
          const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
          
          return (
            <div className="w-full">
              <div className="flex justify-between items-center mb-4 md:mb-5 pb-3 border-b border-slate-600">
                <button className="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-full text-xs md:text-sm hover:bg-blue-600 transition"><i className="fa-solid fa-chevron-left"></i></button>
                <span className="text-lg md:text-xl font-bold tracking-wide">{monthYear}</span>
                <button className="w-8 h-8 flex items-center justify-center bg-slate-800 rounded-full text-xs md:text-sm hover:bg-blue-600 transition"><i className="fa-solid fa-chevron-right"></i></button>
              </div>
              <div className="overflow-x-auto w-full pb-2 scrollbar-hide">
                <div className="grid grid-cols-7 gap-1 md:gap-2 text-center text-xs md:text-sm min-w-[240px]">
                  {daysInWeek.map(d => <div key={d} className="text-blue-400 font-bold py-1 text-[10px] md:text-xs uppercase">{d}</div>)}
                  {Array(firstDay).fill(null).map((_, i) => <div key={`blank-${i}`} className="py-1 md:py-2"></div>)}
                  {Array.from({length: daysInMonth}, (_, i) => i + 1).map(d => (
                    <div key={d} className={`py-1 md:py-1.5 rounded-lg flex items-center justify-center transition-colors ${d === today.getDate() ? 'bg-blue-500 text-white font-bold shadow-lg shadow-blue-500/40' : 'hover:bg-slate-700 text-slate-300'}`}>
                      {new Intl.NumberFormat('bn-BD').format(d)}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
