<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>গতি এক্সপ্রেস - Goti Express</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>

    <!-- FIREBASE SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Leaflet JS & CSS for Custom Coverage Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
            scroll-behavior: smooth;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #5e3186; border-radius: 10px; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }
        
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .logo-animate { animation: floatLogo 3s ease-in-out infinite; }

        /* Icon Animation for Services */
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.1); }
        }
        .icon-animate { animation: iconFloat 2.5s ease-in-out infinite; }

        /* Tech Network Background Animations */
        @keyframes floatBlob1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        @keyframes floatBlob2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-30px, 50px) scale(1.2); }
            66% { transform: translate(20px, -20px) scale(0.8); }
        }
        .tech-blob-1 { animation: floatBlob1 15s infinite ease-in-out alternate; }
        .tech-blob-2 { animation: floatBlob2 18s infinite ease-in-out alternate; }
        
        .gradient-text {
            background: linear-gradient(to right, #2d1960, #5e3186);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bg-theme-gradient {
            background: linear-gradient(135deg, #2d1960 0%, #5e3186 100%);
        }
    </style>
</head>
<body class="relative">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyBmJGTuAvMF9FM6MwOSi4BZqFmGyqb2Yd0",
            authDomain: "goti-express.firebaseapp.com",
            projectId: "goti-express",
            storageBucket: "goti-express.firebasestorage.app",
            messagingSenderId: "427378824805",
            appId: "1:427378824805:web:54373b156fc7f40f65588c"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // 🌐 Public Database Hook
        function usePublicData() {
            const [webConfig, setWebConfig] = useState(null);
            const [packages, setPackages] = useState([]);
            const [reviews, setReviews] = useState([]);
            
            useEffect(() => {
                const unsubConfig = db.collection('websiteConfig').doc('1').onSnapshot(doc => {
                    if(doc.exists) setWebConfig(doc.data());
                });
                const unsubPackages = db.collection('packages').orderBy('price', 'asc').onSnapshot(snap => {
                    setPackages(snap.docs.map(d => d.data()));
                });
                const unsubReviews = db.collection('reviews').orderBy('id', 'desc').limit(10).onSnapshot(snap => {
                    setReviews(snap.docs.map(d => d.data()));
                });
                return () => { unsubConfig(); unsubPackages(); unsubReviews(); };
            }, []);

            const submitComplaint = (data) => db.collection('complaints').doc(data.id.toString()).set(data);
            const submitReview = (data) => db.collection('reviews').doc(data.id.toString()).set(data);
            
            return { webConfig, packages, reviews, submitComplaint, submitReview };
        }

        function App() {
            const { webConfig, packages, reviews, submitComplaint, submitReview } = usePublicData();
            const [showPopup, setShowPopup] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);
            const [showAllPkgs, setShowAllPkgs] = useState(false);

            // Modals State: 'complaint', 'support', 'coverage', 'review', 'connection', null
            const [activeModal, setActiveModal] = useState(null); 

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                if(webConfig?.adsStatus && webConfig?.popupUrl) {
                    const timer = setTimeout(() => setShowPopup(true), 2000);
                    return () => clearTimeout(timer);
                } else {
                    setShowPopup(false);
                }
            }, [webConfig]);

            // Scroll Helper
            const scrollToSec = (id) => {
                setMenuOpen(false);
                if(id === 'home') window.scrollTo(0,0);
                else {
                    const el = document.getElementById(id);
                    if(el) el.scrollIntoView({ behavior: 'smooth' });
                }
            };

            const openModal = (modalName) => {
                setMenuOpen(false);
                setActiveModal(modalName);
            };

            const visiblePackages = showAllPkgs ? packages : packages.slice(0, 3);

            useEffect(() => {
                if (activeModal === 'coverage') {
                    const timer = setTimeout(() => {
                        const mapDom = document.getElementById('coverageMap');
                        if (mapDom && !mapDom._leaflet_id) {
                            const map = L.map('coverageMap');
                            
                            // Google Satellite View Layer
                            L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{
                                maxZoom: 20,
                                subdomains:['mt0','mt1','mt2','mt3']
                            }).addTo(map);

                            // User provided coordinates
                            const points = [
                                [23.65568851727048, 89.04179003976216],
                                [23.652386494099105, 89.04324916141128],
                                [23.6479443552599, 89.04097464825236],
                                [23.647393991275123, 89.03432277014609],
                                [23.64865196269594, 89.04483702908827],
                                [23.644052445961535, 89.04234793921624],
                                [23.658125671380663, 89.0493431400635],
                                [23.661506164795536, 89.05093100774047],
                                [23.65918208212761, 89.05037147070023],
                                [23.66345488549381, 89.06064843446465],
                                [23.65831700309671, 89.05596560667402],
                                [23.658558249598382, 89.06003790975907],
                                [23.651858854636046, 89.04680799029437],
                                [23.64896756927698, 89.05086861487896],
                                [23.66229676257305, 89.0552359766304]
                            ];

                            let cx = 0, cy = 0;
                            points.forEach(p => { cx += p[0]; cy += p[1]; });
                            cx /= points.length;
                            cy /= points.length;

                            points.sort((a, b) => {
                                let angleA = Math.atan2(a[1] - cy, a[0] - cx);
                                let angleB = Math.atan2(b[1] - cy, b[0] - cx);
                                return angleA - angleB;
                            });

                            const polygon = L.polygon(points, {
                                color: '#dc2626',
                                fillColor: '#ef4444',
                                fillOpacity: 0.5,
                                weight: 3
                            }).addTo(map);

                            map.fitBounds(polygon.getBounds());
                        }
                    }, 100);
                    return () => clearTimeout(timer);
                }
            }, [activeModal]);

            // FTP link from Firebase or default
            const ftpLink = webConfig?.ftpLink || '#';

            return (
                <div className="relative overflow-hidden min-h-screen">
                    
                    {/* Animated IT/Tech Background (Digital Nodes) */}
                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-[#5e3186] rounded-full mix-blend-multiply filter blur-[100px] opacity-20 tech-blob-1"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-[#2d1960] rounded-full mix-blend-multiply filter blur-[120px] opacity-20 tech-blob-2"></div>
                        <div className="absolute top-[40%] left-[60%] w-[30vw] h-[30vw] bg-purple-400 rounded-full mix-blend-multiply filter blur-[90px] opacity-10 tech-blob-1" style={{animationDelay: '2s'}}></div>
                    </div>

                    {/* Navbar - SMALLER VERSION */}
                    <nav className={`fixed top-0 w-full z-40 transition-all duration-300 ${scrolled ? 'bg-white/95 backdrop-blur-md shadow-lg py-2' : 'bg-white/80 backdrop-blur-sm py-3 border-b border-white/20'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center relative z-10">
                            {/* Balanced Logo & Name - SIZE REDUCED */}
                            <div className="flex items-center gap-2 cursor-pointer logo-animate" onClick={()=>scrollToSec('home')}>
                                <img src="https://i.ibb.co.com/4Zy9b057/black-goti.png" alt="Goti Express Logo" className="h-9 md:h-10 object-contain" />
                                <span className="text-lg md:text-xl font-black gradient-text tracking-wider pt-1">গতি এক্সপ্রেস</span>
                            </div>
                            
                            {/* Hamburger Icon - SIZE REDUCED */}
                            <button onClick={() => setMenuOpen(true)} className="text-[#2d1960] text-xl md:text-2xl hover:text-[#5e3186] transition-colors p-1.5">
                                <i className="fa-solid fa-bars"></i>
                            </button>
                        </div>
                    </nav>

                    {/* Sidebar Drawer - NOW INCLUDES FTP & BILL PAYMENT */}
                    {menuOpen && (
                        <div className="fixed inset-0 z-50 flex justify-end">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onClick={() => setMenuOpen(false)}></div>
                            <div className="relative w-72 md:w-80 bg-white h-full shadow-2xl flex flex-col animate-fade-in border-l border-purple-100">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-purple-50/50">
                                    <span className="font-bold text-[#2d1960] text-lg"><i className="fa-solid fa-compass mr-2"></i>মেনু</span>
                                    <button onClick={() => setMenuOpen(false)} className="w-8 h-8 bg-white text-red-500 rounded-full flex items-center justify-center hover:bg-red-500 hover:text-white transition shadow-sm"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto py-4">
                                    <ul className="space-y-1">
                                        <li><button onClick={() => scrollToSec('home')} className="w-full text-left flex items-center px-6 py-3.5 text-slate-700 font-bold hover:bg-purple-50 hover:text-[#5e3186] transition border-l-4 border-transparent hover:border-[#5e3186]"><i className="fa-solid fa-house w-6 text-center mr-3 text-lg opacity-80 text-[#5e3186]"></i> হোম</button></li>
                                        
                                        {/* 🔴 BILL PAYMENT OPTION - Placed near top as requested */}
                                        <li><a href="https://portal.inetbills.com/" target="_blank" className="w-full text-left flex items-center px-6 py-3.5 text-slate-700 font-bold hover:bg-purple-50-50 hover:text-[#5e3186]-600 transition border-l-4 border-transparent hover:border-[#5e3186]-500"><i className="fa-solid fa-credit-card w-6 text-center mr-3 text-lg opacity-80 text-[#5e3186]-600"></i> বিল পরিশোধ</a></li>
                                        
                                        {/* 🔴 FTP OPTION - Added as requested */}
                                        <li><a href={ftpLink} target={ftpLink !== '#' ? '_blank' : ''} className="w-full text-left flex items-center px-6 py-3.5 text-slate-700 font-bold hover:bg-purple-50 hover:text-[#5e3186] transition border-l-4 border-transparent hover:border-[#5e3186]"><i className="fa-solid fa-folder-open w-6 text-center mr-3 text-lg opacity-80 text-[#5e3186]"></i> FTP</a></li>
                                        
                                        <li><button onClick={() => scrollToSec('about')} className="w-full text-left flex items-center px-6 py-3.5 text-slate-700 font-bold hover:bg-purple-50 hover:text-[#5e3186] transition border-l-4 border-transparent hover:border-[#5e3186]"><i className="fa-solid fa-bolt w-6 text-center mr-3 text-lg opacity-80 text-[#5e3186]"></i> সার্ভিসেস</button></li>
                                        <li><button onClick={() => scrollToSec('packages')} className="w-full text-left flex items-center px-6 py-3.5 text-slate-700 font-bold hover:bg-purple-50 hover:text-[#5e3186] transition border-l-4 border-transparent hover:border-[#5e3186]"><i className="fa-solid fa-wifi w-6 text-center mr-3 text-lg opacity-80 text-[#5e3186]"></i> প্যাকেজ</button></li>
                                        <li><button onClick={() => openModal('coverage')} className="w-full text-left flex items-center px-6 py-3.5 text-slate-700 font-bold hover:bg-purple-50 hover:text-[#5e3186] transition border-l-4 border-transparent hover:border-[#5e3186]"><i className="fa-solid fa-map-location-dot w-6 text-center mr-3 text-lg opacity-80 text-[#5e3186]"></i> কভারেজ</button></li>
                                        <li><button onClick={() => openModal('support')} className="w-full text-left flex items-center px-6 py-3.5 text-slate-700 font-bold hover:bg-purple-50 hover:text-[#5e3186] transition border-l-4 border-transparent hover:border-[#5e3186]"><i className="fa-solid fa-headset w-6 text-center mr-3 text-lg opacity-80 text-[#5e3186]"></i> সাপোর্ট</button></li>
                                        <li><button onClick={() => openModal('complaint')} className="w-full text-left flex items-center px-6 py-3.5 text-slate-700 font-bold hover:bg-purple-50 hover:text-[#5e3186] transition border-l-4 border-transparent hover:border-[#5e3186]"><i className="fa-solid fa-triangle-exclamation w-6 text-center mr-3 text-lg opacity-80 text-[#5e3186]"></i> অভিযোগ</button></li>
                                        <li><button onClick={() => scrollToSec('review')} className="w-full text-left flex items-center px-6 py-3.5 text-slate-700 font-bold hover:bg-purple-50 hover:text-[#5e3186] transition border-l-4 border-transparent hover:border-[#5e3186]"><i className="fa-solid fa-star w-6 text-center mr-3 text-lg opacity-80 text-[#5e3186]"></i> রিভিউ</button></li>
                                        <li><button onClick={() => scrollToSec('contact')} className="w-full text-left flex items-center px-6 py-3.5 text-slate-700 font-bold hover:bg-purple-50 hover:text-[#5e3186] transition border-l-4 border-transparent hover:border-[#5e3186]"><i className="fa-solid fa-address-book w-6 text-center mr-3 text-lg opacity-80 text-[#5e3186]"></i> যোগাযোগ</button></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Popup Ad */}
                    {showPopup && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                            <div className="relative bg-white rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl ring-4 ring-white/10">
                                <button onClick={() => setShowPopup(false)} className="absolute top-3 right-3 bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold shadow-md hover:bg-red-600 transition z-10"><i className="fa-solid fa-xmark"></i></button>
                                <img src={webConfig.popupUrl} alt="Advertisement" className="w-full h-auto object-contain" />
                            </div>
                        </div>
                    )}

                    {/* Modals System */}
                    {activeModal && (
                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-3xl w-full max-w-md md:max-w-lg overflow-hidden shadow-2xl relative">
                                <button onClick={() => setActiveModal(null)} className="absolute top-4 right-4 text-slate-400 hover:text-red-500 text-2xl z-10 transition-colors"><i className="fa-solid fa-circle-xmark"></i></button>
                                
                                {/* Connection Request Modal */}
                                {activeModal === 'connection' && (
                                    <div className="p-8">
                                        <div className="text-center mb-6">
                                            <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl"><i className="fa-solid fa-wifi"></i></div>
                                            <h3 className="text-2xl font-bold text-slate-800">নতুন সংযোগ আবেদন</h3>
                                            <p className="text-slate-500 text-sm mt-1">আপনার তথ্য দিন, আমরা শীঘ্রই যোগাযোগ করবো</p>
                                        </div>
                                        <form onSubmit={(e) => {
                                            e.preventDefault();
                                            submitComplaint({ 
                                                id: Date.now(), 
                                                name: e.target.name.value, 
                                                phone: e.target.phone.value, 
                                                details: "নতুন সংযোগের আবেদন। ঠিকানা: " + e.target.address.value, 
                                                date: new Date().toLocaleDateString('en-GB') 
                                            });
                                            alert('আপনার আবেদন সফলভাবে জমা হয়েছে। আমরা শীঘ্রই যোগাযোগ করবো।');
                                            setActiveModal(null);
                                        }} className="space-y-4">
                                            <input required name="name" type="text" placeholder="আপনার নাম" className="w-full border-2 border-slate-100 p-3.5 rounded-xl focus:border-[#5e3186] outline-none bg-slate-50 font-medium" />
                                            <input required name="phone" type="text" placeholder="মোবাইল নাম্বার" className="w-full border-2 border-slate-100 p-3.5 rounded-xl focus:border-[#5e3186] outline-none bg-slate-50 font-medium" />
                                            <textarea required name="address" placeholder="যেখানে সংযোগ নিতে চান তার সম্পূর্ণ ঠিকানা লিখুন..." className="w-full border-2 border-slate-100 p-3.5 rounded-xl h-24 focus:border-[#5e3186] outline-none bg-slate-50 resize-none font-medium"></textarea>
                                            <button type="submit" className="w-full bg-[#2d1960] text-white py-3.5 rounded-xl font-bold shadow-lg hover:bg-[#5e3186] transition-colors"><i className="fa-solid fa-paper-plane mr-2"></i> আবেদন জমা দিন</button>
                                        </form>
                                    </div>
                                )}

                                {/* Complaint Modal */}
                                {activeModal === 'complaint' && (
                                    <div className="p-8">
                                        <div className="text-center mb-6">
                                            <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl"><i className="fa-solid fa-triangle-exclamation"></i></div>
                                            <h3 className="text-2xl font-bold text-slate-800">অভিযোগ বক্স</h3>
                                            <p className="text-slate-500 text-sm mt-1">যেকোনো টেকনিক্যাল সমস্যা বিস্তারিত জানান</p>
                                        </div>
                                        <form onSubmit={(e) => {
                                            e.preventDefault();
                                            submitComplaint({ id: Date.now(), name: e.target.name.value, phone: e.target.phone.value, details: e.target.details.value, date: new Date().toLocaleDateString('en-GB') });
                                            alert('আপনার বার্তা সফলভাবে জমা হয়েছে। আমরা শীঘ্রই যোগাযোগ করবো।');
                                            setActiveModal(null);
                                        }} className="space-y-4">
                                            <input required name="name" type="text" placeholder="আপনার নাম" className="w-full border-2 border-slate-100 p-3.5 rounded-xl focus:border-[#5e3186] outline-none bg-slate-50 font-medium" />
                                            <input required name="phone" type="text" placeholder="মোবাইল নাম্বার" className="w-full border-2 border-slate-100 p-3.5 rounded-xl focus:border-[#5e3186] outline-none bg-slate-50 font-medium" />
                                            <textarea required name="details" placeholder="সমস্যা বা অভিযোগ বিস্তারিত লিখুন..." className="w-full border-2 border-slate-100 p-3.5 rounded-xl h-28 focus:border-[#5e3186] outline-none bg-slate-50 resize-none font-medium"></textarea>
                                            <button type="submit" className="w-full bg-[#5e3186] text-white py-3.5 rounded-xl font-bold shadow-lg hover:bg-[#2d1960] transition-colors"><i className="fa-solid fa-paper-plane mr-2"></i> সাবমিট করুন</button>
                                        </form>
                                    </div>
                                )}

                                {/* Support Modal */}
                                {activeModal === 'support' && (
                                    <div className="p-8 text-center">
                                        <div className="w-16 h-16 bg-purple-50 text-[#5e3186] rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"><i className="fa-solid fa-headset"></i></div>
                                        <h3 className="text-2xl font-bold text-slate-800 mb-6">সাপোর্ট সেন্টার</h3>
                                        <div className="space-y-3 text-left">

        // Modern Sliding Banner Component - NOW WITH SMOOTH OPACITY FADE IN
        function HeroSlider({ banners }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [imagesLoaded, setImagesLoaded] = useState({});

            useEffect(() => {
                if(banners.length <= 1) return;
                const timer = setInterval(() => {
                    setCurrentIndex(prev => (prev + 1) % banners.length);
                }, 4000); 
                return () => clearInterval(timer);
            }, [banners]);

            const handleImageLoad = (index) => {
                setImagesLoaded(prev => ({ ...prev, [index]: true }));
            };

            return (
                <div className="absolute inset-0 w-full h-full bg-slate-900 overflow-hidden">
                    <div 
                        className="flex w-full h-full transition-transform duration-1000 ease-in-out"
                        style={{ transform: `translateX(-${currentIndex * 100}%)` }}
                    >
                        {banners.map((url, i) => (
                            <div key={i} className="min-w-full h-full relative">
                                <img 
                                    src={url} 
                                    className={`w-full h-full object-cover transition-opacity duration-500 ease-in-out ${imagesLoaded[i] ? 'opacity-100' : 'opacity-0'}`}
                                    alt={`Banner ${i+1}`} 
                                    onLoad={() => handleImageLoad(i)}
                                />
                            </div>
                        ))}
                    </div>
                    {/* Shadow overlay for navbar visibility */}
                    <div className="absolute top-0 w-full h-32 bg-gradient-to-b from-black/40 to-transparent"></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
