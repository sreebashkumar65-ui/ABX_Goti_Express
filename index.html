<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>গতি এক্সপ্রেস - স্টাফ ম্যানেজমেন্ট সিস্টেম</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 🔴 FIREBASE SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0f172a] m-0 p-0 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 🔴 ফায়ারবেস ক্লাউড ডাটাবেস সেটআপ
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBmJGTuAvMF9FM6MwOSi4BZqFmGyqb2Yd0",
            authDomain: "goti-express.firebaseapp.com",
            projectId: "goti-express",
            storageBucket: "goti-express.firebasestorage.app",
            messagingSenderId: "427378824805",
            appId: "1:427378824805:web:54373b156fc7f40f65588c"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // ==========================================
        // 🟢 কাস্টম হুকস (Custom Hooks)
        // ==========================================
        function useLocalStorage(key, initialValue) {
          const [storedValue, setStoredValue] = useState(() => {
            try {
              const item = window.localStorage.getItem(key);
              return item ? JSON.parse(item) : initialValue;
            } catch (error) { return initialValue; }
          });
          useEffect(() => {
            try { window.localStorage.setItem(key, JSON.stringify(storedValue)); } 
            catch (error) {}
          }, [key, storedValue]);
          return [storedValue, setStoredValue];
        }

        function useDatabase(collectionName, initialData = []) {
            const [data, setData] = useState(() => {
                const local = window.localStorage.getItem('goti_' + collectionName);
                return local ? JSON.parse(local) : initialData;
            });

            useEffect(() => {
                const unsubscribe = db.collection(collectionName).orderBy('id', 'desc').onSnapshot(snapshot => {
                    const docs = snapshot.docs.map(doc => doc.data());
                    if (docs.length > 0) {
                        setData(docs);
                        window.localStorage.setItem('goti_' + collectionName, JSON.stringify(docs));
                    } else if (initialData.length > 0) {
                        initialData.forEach(item => db.collection(collectionName).doc(item.id.toString()).set(item));
                    }
                }, error => {
                    console.error("Cloud Error:", error);
                });
                return () => unsubscribe();
            }, [collectionName]);

            const addData = (newItem) => {
                const newData = [newItem, ...data];
                setData(newData);
                window.localStorage.setItem('goti_' + collectionName, JSON.stringify(newData));
                db.collection(collectionName).doc(newItem.id.toString()).set(newItem).catch(err => console.log(err));
            };

            const updateData = (id, updatedFields) => {
                const newData = data.map(item => item.id === id ? { ...item, ...updatedFields } : item);
                setData(newData);
                window.localStorage.setItem('goti_' + collectionName, JSON.stringify(newData));
                db.collection(collectionName).doc(id.toString()).update(updatedFields);
            };

            const deleteData = (id) => {
                const newData = data.filter(item => item.id !== id);
                setData(newData);
                window.localStorage.setItem('goti_' + collectionName, JSON.stringify(newData));
                db.collection(collectionName).doc(id.toString()).delete();
            };

            return [data, addData, updateData, deleteData];
        }

        // টাইমস্ট্যাম্প হেল্পার ফাংশন
        const getCurrentTimeStr = () => {
            return new Intl.DateTimeFormat('bn-BD', {
                timeZone: 'Asia/Dhaka', year: 'numeric', month: 'short', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', hour12: true 
            }).format(new Date());
        };

        const initialUsers = [
          { id: 1, name: 'Admin', loginId: 'sreebashkumar65@gmail.com', password: '01815151122', role: 'admin', designation: 'Administrator', avatar: null },
          { id: 2, name: 'স্বাধীন আহমেদ তামিম', loginId: '01813910850', password: '01813910850', role: 'employee', designation: 'Technician At Goti Express', avatar: null }
        ];

        // ==========================================
        // 🟡 Main App Component
        // ==========================================
        function App() {
          const [isLoggedIn, setIsLoggedIn] = useLocalStorage('goti_isLoggedIn', false);
          const [currentUser, setCurrentUser] = useLocalStorage('goti_currentUser', null);
          const [currentView, setCurrentView] = useLocalStorage('goti_currentView', 'dashboard');
          const [sidebarOpen, setSidebarOpen] = useState(false);

          // কাস্টম ডায়ালগ (পপ-আপ) স্টেট
          const [dialog, setDialog] = useState({ open: false, type: '', msg: '', action: null, inputVal: '' });
          
          const showAlert = (msg) => setDialog({ open: true, type: 'alert', msg, action: null, inputVal: '' });
          const showConfirm = (msg, action) => setDialog({ open: true, type: 'confirm', msg, action, inputVal: '' });
          const showPrompt = (msg, action) => setDialog({ open: true, type: 'prompt', msg, action, inputVal: '' });

          const [users, addUser, updateUser, deleteUser] = useDatabase('users', initialUsers);
          const [attendances, addAttendance] = useDatabase('attendances', []);
          const [leaves, addLeave, updateLeave, deleteLeave] = useDatabase('leaves', []);
          const [expenses, addExpense, updateExpense, deleteExpense] = useDatabase('expenses', []);
          const [reports, addReport, updateReport, deleteReport] = useDatabase('reports', []);
          const [payments, addPayment] = useDatabase('payments', []);
          const [salaries, addSalary, updateSalary, deleteSalary] = useDatabase('salaries', []);

          useEffect(() => {
              if (currentUser) {
                  const updatedMe = users.find(u => u.id === currentUser.id);
                  if (updatedMe && JSON.stringify(updatedMe) !== JSON.stringify(currentUser)) {
                      setCurrentUser(updatedMe);
                  }
              }
          }, [users, currentUser]);

          const handleLogin = (e) => {
            e.preventDefault();
            const loginId = e.target.loginId.value;
            const password = e.target.password.value;
            const user = users.find(u => u.loginId === loginId && u.password === password);
            if (user) { setCurrentUser(user); setIsLoggedIn(true); setCurrentView('dashboard'); } 
            else { showAlert('লগইন আইডি অথবা পাসওয়ার্ড ভুল হয়েছে!'); }
          };

          const handleLogout = () => {
            showConfirm('আপনি কি লগআউট করতে চান?', () => {
              setIsLoggedIn(false); setCurrentUser(null);
            });
          };

          const updateUserProfile = (updatedUser) => {
            setCurrentUser(updatedUser);
            updateUser(updatedUser.id, { avatar: updatedUser.avatar });
          };

          if (!isLoggedIn) {
            return (
              <div className="min-h-screen bg-[#0f172a] flex flex-col items-center justify-center p-4">
                {dialog.open && <DialogBox dialog={dialog} setDialog={setDialog} />}
                <div className="mb-6 flex justify-center">
                   <img src="https://i.ibb.co.com/fGYvBbLs/white-goti.png" alt="Logo" className="h-28 object-contain drop-shadow-2xl" />
                </div>
                <div className="max-w-md w-full bg-[#1e293b] border border-blue-900/50 rounded-2xl shadow-2xl p-8">
                  <div className="text-center mb-8">
                    <h1 className="text-3xl font-bold text-blue-400 mb-2">গতি এক্সপ্রেস</h1>
                    <p className="text-blue-200/60 text-sm">স্টাফ ম্যানেজমেন্ট সিস্টেম</p>
                  </div>
                  <form onSubmit={handleLogin} className="space-y-6">
                    <div>
                      <label className="block text-sm font-medium text-blue-200 mb-2 pl-1">লগইন আইডি</label>
                      <div className="relative"><i className="fa-solid fa-user absolute left-4 top-3.5 text-slate-400"></i><input type="text" name="loginId" className="w-full pl-11 pr-4 py-3 bg-[#0f172a] border border-slate-600 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none" required placeholder="ফোন বা ইমেইল" /></div>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-blue-200 mb-2 pl-1">পাসওয়ার্ড</label>
                      <div className="relative"><i className="fa-solid fa-lock absolute left-4 top-3.5 text-slate-400"></i><input type="password" name="password" className="w-full pl-11 pr-4 py-3 bg-[#0f172a] border border-slate-600 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none" required placeholder="••••••••" /></div>
                    </div>
                    <button type="submit" className="w-full bg-blue-600 text-white py-3.5 rounded-xl hover:bg-blue-700 font-bold shadow-lg shadow-blue-900/50 mt-4 text-lg">লগইন করুন</button>
                  </form>
                </div>
              </div>
            );
          }

          return (
            <div className="flex h-screen bg-[#f1f5f9] overflow-hidden">
              {dialog.open && <DialogBox dialog={dialog} setDialog={setDialog} />}
              
              {sidebarOpen && <div className="md:hidden fixed inset-0 bg-slate-900/60 z-40 backdrop-blur-sm" onClick={() => setSidebarOpen(false)}></div>}

              <div className={`fixed inset-y-0 left-0 z-50 w-72 md:w-64 transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 transition-transform duration-300 ease-in-out bg-[#1e293b] flex flex-col shadow-2xl`}>
                <div className="p-4 bg-[#0f172a] flex items-center justify-between md:justify-center h-16 shrink-0 border-b border-slate-700">
                  <div className="flex items-center gap-3"><img src="https://i.ibb.co.com/fGYvBbLs/white-goti.png" alt="Logo" className="h-8 object-contain" /><h2 className="text-xl font-bold text-blue-400 truncate">গতি এক্সপ্রেস</h2></div>
                  <button className="md:hidden text-slate-400 p-2" onClick={() => setSidebarOpen(false)}><i className="fa-solid fa-xmark text-xl"></i></button>
                </div>
                
                <div className="md:hidden p-4 border-b border-slate-700/50 bg-slate-800/30 flex items-center gap-3">
                    {currentUser.avatar ? <img src={currentUser.avatar} className="w-10 h-10 rounded-full border-2 border-blue-500 object-cover" /> : <div className="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold text-white shadow-md">{currentUser.name.charAt(0)}</div>}
                    <div className="overflow-hidden"><p className="text-white font-bold truncate">{currentUser.name}</p><p className="text-blue-300 text-xs truncate capitalize">{currentUser.role === 'admin' ? 'এডমিন' : 'স্টাফ'}</p></div>
                </div>

                <div className="flex-1 overflow-y-auto py-4">
                  <nav className="space-y-1.5 px-3">
                    <SidebarItem icon="fa-house" label="ড্যাশবোর্ড" active={currentView === 'dashboard'} onClick={() => {setCurrentView('dashboard'); setSidebarOpen(false);}} />
                    {currentUser.role === 'admin' && <SidebarItem icon="fa-users" label="স্টাফ প্রোফাইল" active={currentView === 'employees'} onClick={() => {setCurrentView('employees'); setSidebarOpen(false);}} />}
                    <SidebarItem icon="fa-user-check" label="উপস্থিতি" active={currentView === 'attendance'} onClick={() => {setCurrentView('attendance'); setSidebarOpen(false);}} />
                    <SidebarItem icon="fa-calendar-day" label="ছুটি" active={currentView === 'leave'} onClick={() => {setCurrentView('leave'); setSidebarOpen(false);}} />
                    <SidebarItem icon="fa-money-bill-wave" label="যাতায়াত ও অন্যান্য বিল" active={currentView === 'expenses'} onClick={() => {setCurrentView('expenses'); setSidebarOpen(false);}} />
                    <SidebarItem icon="fa-file-lines" label="ডেইলি রিপোর্ট" active={currentView === 'reports'} onClick={() => {setCurrentView('reports'); setSidebarOpen(false);}} />
                    <SidebarItem icon="fa-sack-dollar" label="বেতন" active={currentView === 'salary'} onClick={() => {setCurrentView('salary'); setSidebarOpen(false);}} />
                    {currentUser.role === 'admin' && <SidebarItem icon="fa-briefcase" label="পেমেন্ট" active={currentView === 'payments'} onClick={() => {setCurrentView('payments'); setSidebarOpen(false);}} />}
                  </nav>
                </div>
                
                <div className="p-4 border-t border-slate-700 bg-[#0f172a]/50">
                   <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-red-500/10 text-red-400 rounded-xl hover:bg-red-500 hover:text-white transition-colors font-semibold"><i className="fa-solid fa-power-off"></i> লগআউট</button>
                </div>
              </div>

              <div className="flex-1 flex flex-col h-screen overflow-hidden relative">
                <header className="hidden md:flex h-16 bg-[#0f172a] text-white items-center justify-between px-6 shrink-0 shadow-md z-10">
                  <div className="flex items-center space-x-2 text-sm text-blue-300"><i className="fa-solid fa-house text-xs"></i> <span>›</span> <span className="text-blue-100 font-medium capitalize">{currentView}</span></div>
                  <div className="flex items-center space-x-5">
                    <div className="flex items-center space-x-3 pl-5">
                      <div className="text-right"><p className="text-sm font-medium text-blue-50 leading-tight">{currentUser.name}</p><p className="text-xs text-blue-400 capitalize">{currentUser.role === 'admin' ? 'এডমিন' : 'স্টাফ'}</p></div>
                      {currentUser.avatar ? <img src={currentUser.avatar} className="w-9 h-9 rounded-full border-2 border-blue-500 object-cover" /> : <div className="w-9 h-9 bg-blue-600 rounded-full flex items-center justify-center font-bold text-sm shadow">{currentUser.name.charAt(0)}</div>}
                    </div>
                  </div>
                </header>

                <header className="md:hidden h-14 bg-[#0f172a] text-white flex items-center justify-between px-4 shrink-0 shadow-md z-10">
                  <div className="flex items-center gap-2"><img src="https://i.ibb.co.com/fGYvBbLs/white-goti.png" alt="Logo" className="h-6 object-contain" /><span className="font-bold text-blue-100 capitalize">{currentView}</span></div>
                </header>

                <main className="flex-1 overflow-x-hidden overflow-y-auto bg-[#e2e8f0] p-4 pb-24 md:pb-6 sm:p-6 lg:p-8">
                  <div className="max-w-7xl mx-auto">
                    {currentView === 'dashboard' && <DashboardView user={currentUser} updateUser={updateUserProfile} />}
                    {currentView === 'attendance' && <AttendanceView user={currentUser} attendances={attendances} addAttendance={addAttendance} users={users} showAlert={showAlert} />}
                    {currentView === 'leave' && <LeaveView user={currentUser} leaves={leaves} addLeave={addLeave} updateLeave={updateLeave} deleteLeave={deleteLeave} showConfirm={showConfirm} />}
                    {currentView === 'expenses' && <ExpenseView user={currentUser} expenses={expenses} addExpense={addExpense} updateExpense={updateExpense} deleteExpense={deleteExpense} showConfirm={showConfirm} showPrompt={showPrompt} />}
                    {currentView === 'reports' && <ReportView user={currentUser} reports={reports} addReport={addReport} deleteReport={deleteReport} showConfirm={showConfirm} />}
                    {currentView === 'salary' && <SalaryView user={currentUser} users={users} salaries={salaries} addSalary={addSalary} updateSalary={updateSalary} deleteSalary={deleteSalary} showAlert={showAlert} showConfirm={showConfirm} />}
                    {currentView === 'employees' && currentUser.role === 'admin' && <EmployeesView users={users} addUser={addUser} updateUser={updateUser} deleteUser={deleteUser} showConfirm={showConfirm} />}
                    {currentView === 'payments' && currentUser.role === 'admin' && <PaymentsView users={users} payments={payments} addPayment={addPayment} expenses={expenses} />}
                  </div>
                </main>

                <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 pb-safe pt-1 flex justify-around items-center h-[68px] z-30 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] rounded-t-2xl">
                  <BottomNavItem icon="fa-house" label="ড্যাশবোর্ড" active={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                  <BottomNavItem icon="fa-user-check" label="উপস্থিতি" active={currentView === 'attendance'} onClick={() => setCurrentView('attendance')} />
                  <div className="relative -top-5">
                    <button onClick={() => setCurrentView(currentUser.role === 'admin' ? 'reports' : 'expenses')} className="w-14 h-14 bg-blue-600 rounded-full flex flex-col items-center justify-center text-white shadow-lg shadow-blue-500/40 border-4 border-[#e2e8f0] active:scale-95 transition-transform"><i className={`fa-solid ${currentUser.role === 'admin' ? 'fa-file-lines' : 'fa-money-bill-wave'} text-xl`}></i></button>
                  </div>
                  <BottomNavItem icon="fa-sack-dollar" label="বেতন" active={currentView === 'salary'} onClick={() => setCurrentView('salary')} />
                  <BottomNavItem icon="fa-bars" label="মেনু" active={sidebarOpen} onClick={() => setSidebarOpen(true)} />
                </nav>
              </div>
            </div>
          );
        }

        function DialogBox({ dialog, setDialog }) {
          return (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-fade-in-up">
                  <h3 className="text-lg font-bold text-slate-800 mb-4">{dialog.msg}</h3>
                  {dialog.type === 'prompt' && (
                      <input type="text" autoFocus value={dialog.inputVal} onChange={e => setDialog({...dialog, inputVal: e.target.value})} className="w-full border border-slate-300 p-3 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="এখানে লিখুন..." />
                  )}
                  <div className="flex justify-end gap-3 mt-4">
                      {dialog.type !== 'alert' && <button onClick={() => setDialog({open: false})} className="px-5 py-2.5 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition">বাতিল</button>}
                      <button onClick={() => { dialog.action && dialog.action(dialog.inputVal); setDialog({open: false}); }} className="px-5 py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">ঠিক আছে</button>
                  </div>
              </div>
            </div>
          );
        }

        // ==========================================
        // 🔵 Views Components
        // ==========================================
        function BottomNavItem({ icon, label, active, onClick }) {
          return (
            <button onClick={onClick} className={`flex flex-col items-center justify-center w-16 h-full transition-colors ${active ? 'text-blue-600' : 'text-slate-400'}`}>
              <i className={`fa-solid ${icon} text-xl mb-1 ${active ? 'animate-bounce-short' : ''}`}></i><span className={`text-[10px] font-semibold tracking-wide ${active ? 'font-bold' : ''}`}>{label}</span>
            </button>
          );
        }

        function DashboardView({ user, updateUser }) {
          const handleAvatarUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => updateUser({ ...user, avatar: reader.result });
              reader.readAsDataURL(file);
            }
          };

          return (
            <div className="space-y-6">
              <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col relative group">
                <div className="bg-gradient-to-r from-[#1e293b] to-[#0f172a] h-24 md:h-32 relative flex justify-center">
                   <div className="absolute -bottom-10 md:-bottom-12 w-24 h-24 md:w-28 md:h-28 bg-white rounded-2xl md:rounded-xl border-4 border-white overflow-hidden flex items-center justify-center shadow-lg group">
                      {user.avatar ? <img src={user.avatar} alt="Profile" className="w-full h-full object-cover" /> : <img src={`https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=1e293b&color=fff&size=120`} alt="Profile" />}
                      <label className="absolute inset-0 bg-black/50 hidden group-hover:flex items-center justify-center cursor-pointer text-white flex-col transition-all"><i className="fa-solid fa-camera text-xl"></i><input type="file" accept="image/*" onChange={handleAvatarUpload} className="hidden" /></label>
                   </div>
                </div>
                <div className="pt-14 md:pt-16 pb-5 md:pb-6 text-center border-b border-slate-100 px-4">
                  <h3 className="text-xl md:text-2xl font-bold text-slate-800">{user.name}</h3><p className="text-sm text-slate-500 mt-0.5">{user.loginId}</p>
                </div>
                <div className="p-4 md:p-5 flex-1 bg-slate-50/50">
                  <div className="grid grid-cols-2 gap-3 text-sm">
                    <div className="flex flex-col text-slate-700 bg-white p-3 md:p-4 rounded-xl border border-slate-100 shadow-sm items-center text-center"><i className="fa-solid fa-briefcase text-blue-500 mb-2 text-lg"></i><p className="text-[10px] text-slate-400 font-bold uppercase mb-0.5">পদবী</p><p className="font-bold text-xs md:text-sm">{user.designation}</p></div>
                    <div className="flex flex-col text-slate-700 bg-white p-3 md:p-4 rounded-xl border border-slate-100 shadow-sm items-center text-center"><i className="fa-solid fa-shield-halved text-blue-500 mb-2 text-lg"></i><p className="text-[10px] text-slate-400 font-bold uppercase mb-0.5">রোল</p><p className="font-bold text-xs md:text-sm capitalize">{user.role === 'admin' ? 'এডমিন' : 'স্টাফ'}</p></div>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col overflow-hidden"><div className="bg-blue-600 text-white p-3 text-center font-bold text-lg md:text-xl"><RealTimeClock /></div><div className="flex-1 flex items-center justify-center p-6 bg-slate-50"><AnalogClock /></div></div>
                <div className="bg-[#1e293b] text-white rounded-2xl shadow-lg p-5 md:p-6 border border-slate-700 overflow-hidden"><BanglaCalendar /></div>
              </div>
            </div>
          );
        }

        function AttendanceView({ user, attendances, addAttendance, users, showAlert }) {
          const videoRef = useRef(null);
          const canvasRef = useRef(null);
          const [cameraActive, setCameraActive] = useState(false);
          const [cameraError, setCameraError] = useState('');
          const [userLoc, setUserLoc] = useState(null);
          const [locError, setLocError] = useState(false);

          const locale = 'bn-BD';
          const currentDateFormatted = new Intl.DateTimeFormat(locale, { timeZone: 'Asia/Dhaka', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());

          useEffect(() => {
            if (user.role === 'employee') {
               startCamera();
               getLocation();
            }
            return () => stopCamera();
          }, [user.role]);

          const getLocation = () => {
             setLocError(false);
             if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                  pos => { setUserLoc(`${pos.coords.latitude},${pos.coords.longitude}`); setLocError(false); },
                  err => { console.log('Loc err:', err); setLocError(true); }, {enableHighAccuracy: true}
                );
             } else {
                setLocError(true);
             }
          }

          const startCamera = async () => {
            try {
              const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
              if (videoRef.current) { videoRef.current.srcObject = stream; setCameraActive(true); setCameraError(''); }
            } catch (err) { setCameraError('ক্যামেরা চালু করা সম্ভব হয়নি।'); }
          };

          const stopCamera = () => {
            if (videoRef.current && videoRef.current.srcObject) { videoRef.current.srcObject.getTracks().forEach(track => track.stop()); setCameraActive(false); }
          };

          const captureAndSubmit = () => {
            if (!videoRef.current || !cameraActive || !userLoc) {
               if(!userLoc) setLocError(true);
               return;
            }
            const video = videoRef.current; const canvas = canvasRef.current; const context = canvas.getContext('2d');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const photoDataUrl = canvas.toDataURL('image/jpeg', 0.3);
            const currentTime = new Intl.DateTimeFormat(locale, { timeZone: 'Asia/Dhaka', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }).format(new Date());
            const locLink = `https://maps.google.com/?q=${userLoc}`;

            addAttendance({ id: Date.now(), userId: user.id, userName: user.name, date: currentDateFormatted, time: currentTime, photo: photoDataUrl, location: locLink });
            
            const btn = document.getElementById('submit-att-btn');
            if(btn) {
              const originalText = btn.innerHTML;
              btn.innerHTML = `<i class="fa-solid fa-check mr-2"></i> সফল হয়েছে!`;
              btn.classList.add('!bg-green-600');
              setTimeout(() => { btn.innerHTML = originalText; btn.classList.remove('!bg-green-600'); }, 2000);
            }
          };

          const myAttendances = user.role === 'admin' ? attendances : attendances.filter(a => a.userId === user.id);
          const allEmployees = users ? users.filter(u => u.role === 'employee') : [];

          return (
            <div className="bg-white md:p-8 p-5 rounded-2xl border border-slate-200 shadow-sm">
              <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2">
                <i className="fa-solid fa-user-check text-blue-500"></i> উপস্থিতি
              </h2>
              
              {user.role === 'employee' && (
                <div className="mb-8 md:mb-10 bg-slate-50 p-4 md:p-6 rounded-2xl border border-slate-200">
                  <div className="flex flex-col md:flex-row gap-6 items-center md:items-start">
                    <div className="w-full md:w-1/2 max-w-[280px] mx-auto md:mx-0">
                      <div className="relative rounded-2xl overflow-hidden border-4 border-slate-800 bg-black aspect-[3/4] flex items-center justify-center shadow-xl">
                        <video ref={videoRef} autoPlay playsInline muted className={`w-full h-full object-cover ${cameraActive ? 'block' : 'hidden'}`} style={{ transform: 'scaleX(-1)' }} />
                        {!cameraActive && <div className="text-slate-500 flex flex-col items-center text-center p-6"><i className="fa-solid fa-video-slash text-5xl mb-3 opacity-40"></i><p className="text-xs md:text-sm font-medium">{cameraError || 'লাইভ ক্যামেরা (সেলফি)'}</p>{cameraError && <button onClick={startCamera} className="mt-4 px-5 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold shadow-md">Retry</button>}</div>}
                      </div>
                      <canvas ref={canvasRef} className="hidden"></canvas>
                    </div>

                    <div className="flex-1 space-y-4 md:space-y-6 w-full text-center md:text-left">
                      <div className="hidden md:block">
                        <h3 className="text-xl font-bold text-slate-800 mb-2">লাইভ ক্যামেরা (সেলফি)</h3>
                        <p className="text-slate-600 bg-blue-50 p-4 rounded-xl border border-blue-100">ক্যামেরার দিকে তাকিয়ে সাবমিট বাটনে ক্লিক করুন। আপনার বর্তমান ছবি, তারিখ, সময় ও লোকেশন সেভ হবে।</p>
                      </div>
                      
                      {locError && (
                         <div className="bg-red-50 border border-red-200 p-3 rounded-xl flex items-start gap-2 text-left">
                            <i className="fa-solid fa-triangle-exclamation text-red-500 mt-1"></i>
                            <div>
                               <p className="text-sm font-bold text-red-600">লোকেশন (GPS) বন্ধ আছে!</p>
                               <p className="text-xs text-red-500">অবশ্যই লোকেশন অন করতে হবে, তা না হলে উপস্থিতি দেওয়া যাবে না। লোকেশন অন করে চেক বাটনে চাপ দিন।</p>
                               <button onClick={getLocation} className="mt-2 bg-red-100 text-red-600 px-3 py-1 rounded text-xs font-bold hover:bg-red-200">চেক লোকেশন</button>
                            </div>
                         </div>
                      )}

                      <button id="submit-att-btn" onClick={captureAndSubmit} disabled={!cameraActive || !userLoc} className={`w-full py-4 rounded-2xl text-base md:text-lg font-bold flex items-center justify-center transition-all shadow-lg ${cameraActive && userLoc ? 'bg-blue-600 text-white hover:bg-blue-700 active:scale-95' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}><i className="fa-solid fa-camera mr-2 text-xl"></i> উপস্থিতি সাবমিট করুন</button>
                      {userLoc && <div className="text-xs text-green-600 font-bold flex items-center justify-center md:justify-start mt-2"><i className="fa-solid fa-location-dot mr-1"></i> লোকেশন ট্র্যাক করা হয়েছে</div>}
                    </div>
                  </div>
                </div>
              )}

              {user.role === 'admin' && (
                <div className="mb-8">
                  <h3 className="text-lg font-bold text-slate-800 mb-4 bg-slate-100 p-3 rounded-lg border border-slate-200"><i className="fa-solid fa-clipboard-user mr-2 text-blue-600"></i> আজকের উপস্থিতি - <span className="text-blue-600">{currentDateFormatted}</span></h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    {allEmployees.map(emp => {
                      const records = attendances.filter(a => a.userId === emp.id && a.date === currentDateFormatted).sort((a,b) => b.id - a.id);
                      const latestRecord = records[0];
                      return (
                        <div key={emp.id} className={`p-4 rounded-2xl border shadow-sm flex items-center gap-4 ${records.length > 0 ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                          {latestRecord ? <img src={latestRecord.photo} className="w-12 h-12 rounded-xl object-cover border border-green-300 shadow-sm" style={{ transform: 'scaleX(-1)' }} /> : <div className="w-12 h-12 rounded-xl bg-red-100 flex items-center justify-center text-red-400 shadow-sm"><i className="fa-solid fa-user-xmark text-xl"></i></div>}
                          <div className="flex-1">
                            <h4 className="font-bold text-slate-800 text-sm leading-tight mb-1">{emp.name}</h4>
                            {records.length > 0 ? (
                              <div className="flex flex-wrap gap-1">
                                {records.map(r => <span key={r.id} className="bg-green-200 text-green-800 px-2 py-0.5 rounded text-[10px] font-bold"><i className="fa-solid fa-check mr-0.5"></i>{r.time}</span>)}
                              </div>
                            ) : (<span className="bg-red-200 text-red-800 px-2 py-0.5 rounded text-[10px] font-bold"><i className="fa-solid fa-xmark mr-1"></i> অনুপস্থিত</span>)}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              <div>
                <h3 className="text-lg font-bold text-slate-800 mb-4">{user.role === 'admin' ? 'সকল স্টাফের উপস্থিতি' : 'উপস্থিতির ইতিহাস'}</h3>
                <div className="hidden md:block overflow-x-auto rounded-xl border border-slate-200">
                  <table className="w-full text-left border-collapse">
                    <thead><tr className="bg-slate-50 text-slate-500 uppercase text-xs tracking-wider border-b border-slate-200"><th className="p-4 font-bold">ছবি</th><th className="p-4 font-bold">নাম</th><th className="p-4 font-bold">তারিখ</th><th className="p-4 font-bold">সময়</th><th className="p-4 font-bold">লোকেশন</th></tr></thead>
                    <tbody className="divide-y divide-slate-100">
                      {myAttendances.length === 0 ? <tr><td colSpan="5" className="p-8 text-center text-slate-400 font-medium">কোনো রেকর্ড পাওয়া যায়নি</td></tr> : 
                        myAttendances.map(record => (
                          <tr key={record.id} className="hover:bg-slate-50 transition"><td className="p-4"><img src={record.photo} alt="Selfie" className="w-12 h-12 rounded-xl object-cover border border-slate-200" style={{ transform: 'scaleX(-1)' }} /></td><td className="p-4 font-bold text-slate-800">{record.userName}</td><td className="p-4 text-slate-600 font-medium">{record.date}</td><td className="p-4"><span className="inline-block bg-green-50 text-green-700 px-3 py-1 rounded-lg text-xs font-bold border border-green-200">{record.time}</span></td><td className="p-4">{record.location ? <a href={record.location} target="_blank" className="text-blue-500 hover:text-blue-700 text-xs font-bold bg-blue-50 px-2 py-1 rounded"><i className="fa-solid fa-map-location-dot mr-1"></i> ম্যাপে দেখুন</a> : <span className="text-slate-400 text-xs">N/A</span>}</td></tr>
                        ))}
                    </tbody>
                  </table>
                </div>
                <div className="md:hidden grid grid-cols-1 gap-3">
                   {myAttendances.length === 0 ? <div className="p-6 text-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200">কোনো রেকর্ড পাওয়া যায়নি</div> :
                     myAttendances.map(record => (
                       <div key={record.id} className="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                          <img src={record.photo} alt="Selfie" className="w-16 h-16 rounded-xl object-cover border border-slate-100 shadow-sm" style={{ transform: 'scaleX(-1)' }} />
                          <div className="flex-1">
                             <h4 className="font-bold text-slate-800 text-sm mb-1 leading-tight">{record.userName}</h4>
                             <div className="flex flex-wrap items-center gap-2 text-[10px]">
                               <span className="text-slate-500"><i className="fa-regular fa-calendar mr-1"></i>{record.date}</span>
                               <span className="bg-green-100 text-green-700 px-2 py-0.5 rounded font-bold">{record.time}</span>
                               {record.location && <a href={record.location} target="_blank" className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-bold"><i className="fa-solid fa-map-location-dot"></i> ম্যাপ</a>}
                             </div>
                          </div>
                       </div>
                     ))}
                </div>
              </div>
            </div>
          );
        }

        function LeaveView({ user, leaves, addLeave, updateLeave, deleteLeave, showConfirm }) {
          const [startDate, setStartDate] = useState(''); const [endDate, setEndDate] = useState(''); const [reason, setReason] = useState('');
          const submitLeave = (e) => { e.preventDefault(); addLeave({ id: Date.now(), userId: user.id, userName: user.name, startDate, endDate, reason, requestDate: new Date().toLocaleDateString('bn-BD'), status: 'অপেক্ষমান' }); setStartDate(''); setEndDate(''); setReason(''); };
          const displayLeaves = user.role === 'admin' ? leaves : leaves.filter(l => l.userId === user.id);
          return (
            <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
              <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2"><i className="fa-solid fa-calendar-day text-blue-500"></i> ছুটি</h2>
              {user.role === 'employee' && (
                <form onSubmit={submitLeave} className="mb-8 bg-blue-50/50 p-5 md:p-6 rounded-2xl border border-blue-100 grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div><label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">শুরুর তারিখ</label><input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required /></div>
                  <div><label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">শেষ তারিখ</label><input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required /></div>
                  <div className="md:col-span-2"><label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">ছুটির কারণ</label><textarea value={reason} onChange={e => setReason(e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none h-24 resize-none" required placeholder="ছুটির বিস্তারিত কারণ লিখুন..."></textarea></div>
                  <div className="md:col-span-2 mt-2"><button type="submit" className="w-full md:w-auto bg-blue-600 text-white px-8 py-3.5 rounded-xl hover:bg-blue-700 font-bold shadow-lg active:scale-95 transition-all"><i className="fa-solid fa-paper-plane mr-2"></i> ছুটির আবেদন</button></div>
                </form>
              )}
              <div className="space-y-4">
                {displayLeaves.length === 0 ? <div className="p-8 text-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200">কোনো রেকর্ড পাওয়া যায়নি</div> :
                  displayLeaves.map(leave => (
                    <div key={leave.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm relative">
                      <div className="flex justify-between items-start mb-2"><span className="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md"><i className="fa-regular fa-calendar mr-1"></i> Requested: {leave.requestDate}</span><span className={`px-2 py-0.5 text-[10px] rounded-md font-bold uppercase tracking-wider border ${leave.status === 'অনুমোদিত' ? 'bg-green-50 text-green-700 border-green-200' : leave.status === 'বাতিল' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-orange-50 text-orange-700 border-orange-200'}`}>{leave.status}</span></div>
                      {user.role === 'admin' && <div className="text-sm font-bold text-blue-600 mb-2">{leave.userName}</div>}
                      <div className="text-sm text-slate-800 font-bold mb-1">Date: {leave.startDate} to {leave.endDate}</div>
                      <div className="text-sm text-slate-600 mb-4 bg-slate-50 p-3 rounded-lg border border-slate-100">{leave.reason}</div>
                      <div className="flex gap-2">
                          {user.role === 'admin' && leave.status === 'অপেক্ষমান' && (
                            <>
                              <button onClick={() => updateLeave(leave.id, { status: 'অনুমোদিত' })} className="flex-1 bg-green-50 text-green-600 hover:bg-green-600 hover:text-white py-2 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1"><i className="fa-solid fa-check"></i> Approve</button>
                              <button onClick={() => updateLeave(leave.id, { status: 'বাতিল' })} className="flex-1 bg-red-50 text-red-600 hover:bg-red-600 hover:text-white py-2 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1"><i className="fa-solid fa-xmark"></i> Reject</button>
                            </>
                          )}
                          <button onClick={() => showConfirm('আপনি কি এই রেকর্ডটি ডিলিট করতে চান?', () => deleteLeave(leave.id))} className="flex-1 max-w-[100px] bg-slate-100 text-slate-500 hover:bg-red-500 hover:text-white py-2 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1"><i className="fa-solid fa-trash-can"></i></button>
                      </div>
                    </div>
                  ))
                }
              </div>
            </div>
          );
        }

        function ExpenseView({ user, expenses, addExpense, updateExpense, deleteExpense, showConfirm, showPrompt }) {
          const [amount, setAmount] = useState(''); const [desc, setDesc] = useState(''); const [category, setCategory] = useState('travel');

          const submitExpense = (e) => {
            e.preventDefault();
            addExpense({ id: Date.now(), userId: user.id, userName: user.name, category: category, amount: parseFloat(amount), description: desc, date: new Date().toLocaleDateString('bn-BD'), status: 'অপেক্ষমান', rejectReason: '' });
            setAmount(''); setDesc(''); setCategory('travel');
          };

          const handleReject = (id) => {
             showPrompt('বাতিল করার কারণ লিখুন:', (reason) => {
               if(reason) { updateExpense(id, { status: 'বাতিল', rejectReason: reason, rejectedAt: getCurrentTimeStr() }); }
             });
          };

          const displayExpenses = user.role === 'admin' ? expenses : expenses.filter(e => e.userId === user.id);
          
          const myPending = displayExpenses.filter(e => e.status === 'অপেক্ষমান').reduce((sum, e) => sum + e.amount, 0);
          const myApproved = displayExpenses.filter(e => e.status === 'অনুমোদিত').reduce((sum, e) => sum + e.amount, 0);
          const myPaid = displayExpenses.filter(e => e.status === 'পেইড').reduce((sum, e) => sum + e.amount, 0);

          return (
            <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
              <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2">
                <i className="fa-solid fa-money-bill-wave text-blue-500"></i> যাতায়াত ও অন্যান্য বিল
              </h2>

              <div className="grid grid-cols-3 gap-2 md:gap-4 mb-6">
                 <div className="bg-orange-50 border border-orange-100 p-3 md:p-4 rounded-xl text-center"><p className="text-[10px] md:text-xs text-orange-600 font-bold uppercase">অপেক্ষমান</p><p className="text-lg md:text-2xl font-black text-orange-700">৳{myPending}</p></div>
                 <div className="bg-blue-50 border border-blue-100 p-3 md:p-4 rounded-xl text-center"><p className="text-[10px] md:text-xs text-blue-600 font-bold uppercase">অনুমোদিত</p><p className="text-lg md:text-2xl font-black text-blue-700">৳{myApproved}</p></div>
                 <div className="bg-green-50 border border-green-100 p-3 md:p-4 rounded-xl text-center"><p className="text-[10px] md:text-xs text-green-600 font-bold uppercase">পেইড</p><p className="text-lg md:text-2xl font-black text-green-700">৳{myPaid}</p></div>
              </div>
              
              {user.role === 'employee' && (
                <form onSubmit={submitExpense} className="mb-8 bg-blue-50/50 p-5 md:p-6 rounded-2xl border border-blue-100 flex flex-col md:flex-row gap-4 md:items-end">
                  <div className="w-full md:w-1/4">
                    <label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">ধরন</label>
                    <select value={category} onChange={e=>setCategory(e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                      <option value="travel">যাতায়াত</option>
                      <option value="other">অন্যান্য বিল</option>
                    </select>
                  </div>
                  <div className="w-full md:w-1/4"><label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">পরিমাণ (৳)</label><div className="relative"><span className="absolute left-4 top-3.5 text-slate-400 font-bold">৳</span><input type="number" value={amount} onChange={e => setAmount(e.target.value)} className="w-full pl-8 pr-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required placeholder="0.00" /></div></div>
                  <div className="w-full md:w-1/3"><label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">বিবরণ/স্থান</label><input type="text" value={desc} onChange={e => setDesc(e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required placeholder="বিবরণ..." /></div>
                  <button type="submit" className="w-full md:w-auto bg-blue-600 text-white px-8 py-3.5 rounded-xl hover:bg-blue-700 font-bold whitespace-nowrap shadow-lg active:scale-95 transition-all"><i className="fa-solid fa-plus mr-2"></i>এন্ট্রি করুন</button>
                </form>
              )}
              
              <div className="hidden md:block overflow-x-auto rounded-xl border border-slate-200">
                <table className="w-full text-left border-collapse">
                  <thead><tr className="bg-slate-50 text-slate-500 uppercase text-xs tracking-wider border-b border-slate-200"><th className="p-4 font-bold">তারিখ</th>{user.role === 'admin' && <th className="p-4 font-bold">নাম</th>}<th className="p-4 font-bold">ধরন</th><th className="p-4 font-bold">বিবরণ</th><th className="p-4 font-bold">পরিমাণ</th><th className="p-4 font-bold">স্ট্যাটাস</th><th className="p-4 font-bold">অ্যাকশন</th></tr></thead>
                  <tbody className="divide-y divide-slate-100">
                    {displayExpenses.length === 0 ? <tr><td colSpan="7" className="p-8 text-center text-slate-400 font-medium">কোনো রেকর্ড পাওয়া যায়নি</td></tr> : 
                      displayExpenses.map(exp => (
                        <tr key={exp.id} className="hover:bg-slate-50 transition">
                           <td className="p-4 text-slate-600 font-medium">{exp.date}</td>
                           {user.role === 'admin' && <td className="p-4 font-bold text-slate-800">{exp.userName}</td>}
                           <td className="p-4"><span className={`px-2 py-1 text-[10px] font-bold rounded ${exp.category==='travel' ? 'bg-indigo-100 text-indigo-700' : 'bg-purple-100 text-purple-700'}`}>{exp.category==='travel' ? 'যাতায়াত' : 'অন্যান্য বিল'}</span></td>
                           <td className="p-4 text-slate-700">{exp.description} {exp.rejectReason && <div className="text-[10px] text-red-500 font-bold mt-1 bg-red-50 inline-block px-1 rounded">Note: {exp.rejectReason}</div>}</td>
                           <td className="p-4 font-black text-blue-600 text-lg">৳{exp.amount}</td>
                           <td className="p-4">
                             <span className={`px-3 py-1 text-[10px] uppercase rounded-lg font-bold border ${exp.status === 'পেইড' ? 'bg-green-100 text-green-800 border-green-300' : exp.status === 'অনুমোদিত' ? 'bg-blue-50 text-blue-700 border-blue-200' : exp.status === 'বাতিল' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-orange-50 text-orange-700 border-orange-200'}`}>{exp.status}</span>
                             {exp.approvedAt && <div className="text-[9px] text-blue-600 mt-1 font-semibold whitespace-nowrap"><i className="fa-regular fa-clock"></i> {exp.approvedAt}</div>}
                             {exp.paidAt && <div className="text-[9px] text-green-600 mt-1 font-semibold whitespace-nowrap"><i className="fa-regular fa-clock"></i> {exp.paidAt}</div>}
                           </td>
                           <td className="p-4 flex space-x-1">
                             {user.role === 'admin' && exp.status === 'অপেক্ষমান' && <><button onClick={() => updateExpense(exp.id, {status: 'অনুমোদিত', approvedAt: getCurrentTimeStr()})} className="bg-blue-100 text-blue-600 hover:bg-blue-600 hover:text-white p-2 rounded-lg" title="Approve"><i className="fa-solid fa-check"></i></button><button onClick={() => handleReject(exp.id)} className="bg-red-100 text-red-600 hover:bg-red-600 hover:text-white p-2 rounded-lg" title="Reject"><i className="fa-solid fa-xmark"></i></button></>}
                             {user.role === 'admin' && exp.status === 'অনুমোদিত' && <button onClick={() => updateExpense(exp.id, {status: 'পেইড', paidAt: getCurrentTimeStr()})} className="bg-green-100 text-green-700 hover:bg-green-600 hover:text-white px-3 py-2 rounded-lg text-xs font-bold" title="Mark Paid">পে করুন</button>}
                             <button onClick={() => showConfirm('ডিলিট করতে চান?', () => deleteExpense(exp.id))} className="bg-slate-100 text-slate-500 hover:bg-red-500 hover:text-white p-2 rounded-lg" title="Delete"><i className="fa-solid fa-trash-can"></i></button>
                           </td>
                        </tr>
                      ))}
                  </tbody>
                </table>
              </div>

              <div className="md:hidden grid grid-cols-1 gap-4">
                 {displayExpenses.length === 0 ? <div className="p-6 text-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200">কোনো রেকর্ড পাওয়া যায়নি</div> :
                   displayExpenses.map(exp => (
                     <div key={exp.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm relative">
                        <div className="flex justify-between items-start mb-2"><span className="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md">{exp.date}</span><span className={`px-2 py-0.5 text-[9px] rounded-md font-bold uppercase border ${exp.status === 'পেইড' ? 'bg-green-100 text-green-800' : exp.status === 'অনুমোদিত' ? 'bg-blue-50 text-blue-700' : exp.status === 'বাতিল' ? 'bg-red-50 text-red-700' : 'bg-orange-50 text-orange-700'}`}>{exp.status}</span></div>
                        {user.role === 'admin' && <div className="text-xs font-bold text-blue-600 mb-1">{exp.userName}</div>}
                        <div className="font-black text-slate-800 text-xl mb-1">৳{exp.amount} <span className={`text-[9px] px-1 py-0.5 align-middle rounded font-bold ${exp.category==='travel' ? 'bg-indigo-100 text-indigo-700' : 'bg-purple-100 text-purple-700'}`}>{exp.category==='travel' ? 'যাতায়াত' : 'অন্যান্য বিল'}</span></div>
                        <div className="text-sm text-slate-600 leading-tight mb-2">{exp.description}</div>
                        {exp.rejectReason && <div className="text-xs text-red-600 bg-red-50 p-2 rounded mb-2 font-medium"><i className="fa-solid fa-circle-info mr-1"></i>বাতিলের কারণ: {exp.rejectReason}</div>}
                        
                        {(exp.approvedAt || exp.paidAt) && (
                          <div className="mb-3">
                             {exp.approvedAt && <div className="text-[10px] text-blue-500 font-semibold"><i className="fa-regular fa-clock"></i> অনুমোদিত: {exp.approvedAt}</div>}
                             {exp.paidAt && <div className="text-[10px] text-green-500 font-semibold mt-0.5"><i className="fa-regular fa-clock"></i> পেইড: {exp.paidAt}</div>}
                          </div>
                        )}
                        
                        <div className="flex flex-wrap gap-2 border-t border-slate-100 pt-3">
                            {user.role === 'admin' && exp.status === 'অপেক্ষমান' && <><button onClick={() => updateExpense(exp.id, {status: 'অনুমোদিত', approvedAt: getCurrentTimeStr()})} className="flex-1 bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white py-2 rounded-xl text-xs font-bold transition"><i className="fa-solid fa-check"></i> Approve</button><button onClick={() => handleReject(exp.id)} className="flex-1 bg-red-50 text-red-600 hover:bg-red-600 hover:text-white py-2 rounded-xl text-xs font-bold transition"><i className="fa-solid fa-xmark"></i> Reject</button></>}
                            {user.role === 'admin' && exp.status === 'অনুমোদিত' && <button onClick={() => updateExpense(exp.id, {status: 'পেইড', paidAt: getCurrentTimeStr()})} className="flex-1 bg-green-50 text-green-700 hover:bg-green-600 hover:text-white py-2 rounded-xl text-xs font-bold transition"><i className="fa-solid fa-check-double"></i> পে করুন</button>}
                            <button onClick={() => showConfirm('ডিলিট করতে চান?', () => deleteExpense(exp.id))} className="bg-slate-100 text-slate-500 hover:bg-red-500 hover:text-white px-3 py-2 rounded-xl text-xs font-bold transition"><i className="fa-solid fa-trash-can"></i></button>
                        </div>
                     </div>
                   ))}
              </div>
            </div>
          );
        }

        function ReportView({ user, reports, addReport, deleteReport, showConfirm }) {
          const [customers, setCustomers] = useState(''); const [reportText, setReportText] = useState('');
          const submitReport = (e) => { e.preventDefault(); addReport({ id: Date.now(), userId: user.id, userName: user.name, customers: parseInt(customers) || 0, reportText: reportText, date: new Date().toLocaleDateString('bn-BD') }); setCustomers(''); setReportText(''); };
          const displayReports = user.role === 'admin' ? reports : reports.filter(r => r.userId === user.id);

          return (
            <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
              <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2"><i className="fa-solid fa-file-lines text-blue-500"></i> ডেইলি রিপোর্ট</h2>
              {user.role === 'employee' && (
                <form onSubmit={submitReport} className="mb-8 space-y-4 md:space-y-5 bg-blue-50/30 p-5 md:p-6 rounded-2xl border border-blue-100">
                  <div><label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">কাস্টমার সাপোর্ট দিয়েছেন?</label><input type="number" value={customers} onChange={e => setCustomers(e.target.value)} className="w-full md:w-1/3 border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required min="0" placeholder="e.g. 5" /></div>
                  <div><label className="block text-xs md:text-sm font-bold text-slate-700 mb-2">কাজের বিস্তারিত বিবরণ</label><textarea value={reportText} onChange={e => setReportText(e.target.value)} className="w-full border border-slate-300 p-4 rounded-xl h-28 md:h-32 focus:ring-2 focus:ring-blue-500 outline-none resize-none" required placeholder="আজকের কাজের বিস্তারিত লিখুন..."></textarea></div>
                  <button type="submit" className="w-full md:w-auto bg-[#1e293b] text-white px-8 py-3.5 rounded-xl hover:bg-slate-800 font-bold shadow-lg active:scale-95 transition-all"><i className="fa-solid fa-paper-plane mr-2"></i> রিপোর্ট জমা দিন</button>
                </form>
              )}
              <div className="space-y-4">
                {displayReports.length === 0 ? <div className="p-8 text-center text-slate-400 border border-dashed border-slate-300 rounded-2xl bg-slate-50 font-medium">কোনো রেকর্ড পাওয়া যায়নি</div> :
                  displayReports.map(rep => (
                    <div key={rep.id} className="border border-slate-200 rounded-2xl p-4 md:p-5 shadow-sm bg-white relative">
                      {user.role === 'admin' && <button onClick={() => showConfirm('রিপোর্টটি ডিলিট করবেন?', () => deleteReport(rep.id))} className="absolute top-4 right-4 text-red-400 hover:text-red-600 bg-red-50 p-2 rounded-lg"><i className="fa-solid fa-trash-can"></i></button>}
                      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 md:mb-4 border-b border-slate-100 pb-3 pr-10 gap-2">
                        <div><div className="font-bold text-slate-800 text-base md:text-lg">{rep.userName}</div><div className="text-xs font-bold text-slate-400 mt-0.5"><i className="fa-regular fa-calendar mr-1"></i> {rep.date}</div></div>
                        <div className="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold border border-blue-100 flex items-center"><i className="fa-solid fa-users mr-2 opacity-70"></i> Customers: <span className="ml-1 text-sm">{rep.customers}</span></div>
                      </div>
                      <p className="text-slate-700 whitespace-pre-wrap leading-relaxed text-sm md:text-base">{rep.reportText}</p>
                    </div>
                  ))}
              </div>
            </div>
          );
        }

        // --- Salary Setup & Status View ---
        function SalaryView({ user, users, salaries, addSalary, updateSalary, deleteSalary, showAlert, showConfirm }) {
           const [editingSalId, setEditingSalId] = useState(null);
           const [empId, setEmpId] = useState(''); const [month, setMonth] = useState(''); const [baseSalary, setBaseSalary] = useState('');
           const [additions, setAdditions] = useState(''); const [deductions, setDeductions] = useState(''); const [deductionReason, setDeductionReason] = useState('');
           const [status, setStatus] = useState('পেন্ডিং');

           const submitSalary = (e) => {
              e.preventDefault();
              const emp = users.find(u => u.id.toString() === empId);
              if(!emp) return;
              
              // Net = Base - Additions (Advance/Zoma) - Deductions
              const netSalary = (parseFloat(baseSalary)||0) - (parseFloat(additions)||0) - (parseFloat(deductions)||0);

              if (editingSalId) {
                  updateSalary(editingSalId, { 
                      userId: emp.id, userName: emp.name, month, 
                      baseSalary: parseFloat(baseSalary)||0, additions: parseFloat(additions)||0, 
                      deductions: parseFloat(deductions)||0, deductionReason, status, netSalary 
                  });
                  setEditingSalId(null);
                  showAlert('বেতন সফলভাবে আপডেট করা হয়েছে!');
              } else {
                  addSalary({ 
                      id: Date.now(), userId: emp.id, userName: emp.name, month: month, 
                      baseSalary: parseFloat(baseSalary)||0, additions: parseFloat(additions)||0, 
                      deductions: parseFloat(deductions)||0, deductionReason: deductionReason, 
                      status: status, netSalary: netSalary 
                  });
                  showAlert('বেতন সফলভাবে সেভ করা হয়েছে!');
              }
              
              setEmpId(''); setMonth(''); setBaseSalary(''); setAdditions(''); setDeductions(''); setDeductionReason(''); setStatus('পেন্ডিং');
           };

           const handleEditSalary = (sal) => {
              setEditingSalId(sal.id); setEmpId(sal.userId.toString()); setMonth(sal.month);
              setBaseSalary(sal.baseSalary.toString()); setAdditions(sal.additions.toString());
              setDeductions(sal.deductions.toString()); setDeductionReason(sal.deductionReason || '');
              setStatus(sal.status);
              window.scrollTo({ top: 0, behavior: 'smooth' });
           };

           const cancelEdit = () => {
              setEditingSalId(null); setEmpId(''); setMonth(''); setBaseSalary(''); setAdditions(''); setDeductions(''); setDeductionReason(''); setStatus('পেন্ডিং');
           };

           const displaySalaries = user.role === 'admin' ? salaries : salaries.filter(s => s.userId === user.id);

           return (
              <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm space-y-8">
                 <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2"><i className="fa-solid fa-sack-dollar text-blue-500"></i> বেতনের স্ট্যাটাস ও হিস্টোরি</h2>
                 
                 {user.role === 'admin' && (
                    <div className="bg-blue-50/30 p-5 rounded-2xl border border-blue-100">
                      <h3 className="font-bold text-slate-800 mb-4">{editingSalId ? 'বেতন এডিট করুন' : 'বেতন সেটআপ করুন'}</h3>
                      <form onSubmit={submitSalary} className="grid grid-cols-1 md:grid-cols-3 gap-4">
                         <div><label className="block text-xs font-bold mb-2 text-slate-700">স্টাফ নির্বাচন করুন</label><select required value={empId} onChange={e=>setEmpId(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white"><option value="">-- নির্বাচন করুন --</option>{users.filter(u=>u.role==='employee').map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
                         <div><label className="block text-xs font-bold mb-2 text-slate-700">মাস</label><input type="month" required value={month} onChange={e=>setMonth(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500" /></div>
                         <div><label className="block text-xs font-bold mb-2 text-slate-700">স্ট্যাটাস</label><select value={status} onChange={e=>setStatus(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white"><option value="পেন্ডিং">পেন্ডিং</option><option value="অনুমোদিত">অনুমোদিত</option><option value="পেইড">পেইড</option></select></div>
                         
                         <div><label className="block text-xs font-bold mb-2 text-slate-700">মূল বেতন (৳)</label><input type="number" required value={baseSalary} onChange={e=>setBaseSalary(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="0" /></div>
                         <div><label className="block text-xs font-bold mb-2 text-slate-700">অগ্রিম/বেতন বাবদ জমা (-)</label><input type="number" value={additions} onChange={e=>setAdditions(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="0" /></div>
                         <div><label className="block text-xs font-bold mb-2 text-slate-700">বেতন কর্তন (-)</label><input type="number" value={deductions} onChange={e=>setDeductions(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="0" /></div>
                         
                         <div className="md:col-span-2"><label className="block text-xs font-bold mb-2 text-slate-700">কর্তনের কারণ</label><input type="text" value={deductionReason} onChange={e=>setDeductionReason(e.target.value)} className="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="যদি থাকে..." /></div>
                         <div className="md:col-span-1 flex items-end gap-2">
                             <button type="submit" className="w-full bg-blue-600 text-white px-4 py-3 rounded-xl hover:bg-blue-700 font-bold active:scale-95 transition-all">{editingSalId ? 'আপডেট করুন' : 'সেভ করুন'}</button>
                             {editingSalId && <button type="button" onClick={cancelEdit} className="w-1/2 bg-slate-200 text-slate-700 px-4 py-3 rounded-xl font-bold hover:bg-slate-300 transition-all">Cancel</button>}
                         </div>
                      </form>
                    </div>
                 )}

                 <div>
                    <h3 className="text-lg font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2"><i className="fa-solid fa-clock-rotate-left mr-2 text-slate-500"></i> হিস্টোরি (মাসিক)</h3>
                    <div className="space-y-4">
                       {displaySalaries.length === 0 ? <div className="p-8 text-center text-slate-400 border border-dashed border-slate-300 rounded-2xl bg-slate-50 font-medium">কোনো বেতনের হিস্টোরি পাওয়া যায়নি</div> :
                          displaySalaries.sort((a,b) => b.month.localeCompare(a.month)).map(sal => (
                             <div key={sal.id} className="bg-white border border-slate-200 rounded-xl p-4 md:p-5 shadow-sm relative">
                                {user.role === 'admin' && (
                                   <div className="absolute top-4 right-4 flex gap-2">
                                      <button onClick={() => handleEditSalary(sal)} className="text-blue-500 hover:text-blue-700 bg-blue-50 p-2 rounded-lg"><i className="fa-solid fa-pen"></i></button>
                                      <button onClick={() => showConfirm('এই রেকর্ড ডিলিট করবেন?', () => deleteSalary(sal.id))} className="text-red-400 hover:text-red-600 bg-red-50 p-2 rounded-lg"><i className="fa-solid fa-trash-can"></i></button>
                                   </div>
                                )}
                                <div className="flex justify-between items-start mb-4 border-b border-slate-100 pb-3 pr-24">
                                   <div><span className="bg-slate-100 text-slate-700 px-3 py-1 rounded-lg text-sm font-bold tracking-wide mr-2"><i className="fa-regular fa-calendar-days mr-1"></i> {sal.month}</span>{user.role === 'admin' && <span className="font-bold text-blue-600 text-sm">{sal.userName}</span>}</div>
                                   <div className="text-right">
                                       <span className={`px-3 py-1 rounded-lg text-xs font-bold ${sal.status === 'পেইড' ? 'bg-green-100 text-green-700' : sal.status === 'অনুমোদিত' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700'}`}>{sal.status}</span>
                                       {sal.approvedAt && <div className="text-[9px] text-blue-600 mt-1.5 font-bold"><i className="fa-regular fa-clock"></i> অনুমোদিত: {sal.approvedAt}</div>}
                                       {sal.paidAt && <div className="text-[9px] text-green-600 mt-1 font-bold"><i className="fa-regular fa-clock"></i> পেইড: {sal.paidAt}</div>}
                                   </div>
                                </div>
                                
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                                   <div className="bg-slate-50 p-3 rounded-lg"><p className="text-[10px] text-slate-500 font-bold mb-1">মূল বেতন</p><p className="font-bold text-slate-800">৳{sal.baseSalary}</p></div>
                                   <div className="bg-indigo-50 p-3 rounded-lg"><p className="text-[10px] text-indigo-500 font-bold mb-1">অগ্রিম/বেতন বাবদ জমা (-)</p><p className="font-bold text-indigo-700">৳{sal.additions}</p></div>
                                   <div className="bg-red-50 p-3 rounded-lg"><p className="text-[10px] text-red-500 font-bold mb-1">বেতন কর্তন (-)</p><p className="font-bold text-red-600">৳{sal.deductions}</p></div>
                                   <div className="bg-green-50 p-3 rounded-lg border border-green-100"><p className="text-[10px] text-green-600 font-bold mb-1">প্রাপ্য বেতন (Net)</p><p className="text-lg font-black text-green-700 leading-none">৳{sal.netSalary}</p></div>
                                </div>
                                {sal.deductionReason && <div className="mt-3 text-xs bg-red-50 text-red-600 p-2 rounded-lg font-medium"><i className="fa-solid fa-circle-info mr-1"></i> কর্তনের কারণ: {sal.deductionReason}</div>}
                                
                                {user.role === 'admin' && sal.status !== 'পেইড' && (
                                   <div className="mt-4 flex gap-2">
                                      {sal.status === 'পেন্ডিং' && <button onClick={()=>updateSalary(sal.id, {status: 'অনুমোদিত', approvedAt: getCurrentTimeStr()})} className="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white px-4 py-2 rounded-lg text-xs font-bold transition">অনুমোদন দিন</button>}
                                      {sal.status === 'অনুমোদিত' && <button onClick={()=>updateSalary(sal.id, {status: 'পেইড', paidAt: getCurrentTimeStr()})} className="bg-green-50 text-green-700 hover:bg-green-600 hover:text-white px-4 py-2 rounded-lg text-xs font-bold transition">পেমেন্ট সম্পন্ন (Mark Paid)</button>}
                                   </div>
                                )}
                             </div>
                          ))
                       }
                    </div>
                 </div>
              </div>
           );
        }

        function EmployeesView({ users, addUser, updateUser, deleteUser, showConfirm }) {
          const [editingId, setEditingId] = useState(null);
          const [name, setName] = useState(''); const [loginId, setLoginId] = useState(''); const [password, setPassword] = useState(''); const [designation, setDesignation] = useState('');

          const submitUser = (e) => {
            e.preventDefault();
            if (editingId) { updateUser(editingId, { name, loginId, password, designation }); setEditingId(null); } 
            else { addUser({ id: Date.now(), name, loginId, password, designation, role: 'employee', avatar: null }); }
            setName(''); setLoginId(''); setPassword(''); setDesignation('');
          };

          const handleEdit = (u) => { setEditingId(u.id); setName(u.name); setLoginId(u.loginId); setPassword(u.password); setDesignation(u.designation); window.scrollTo({ top: 0, behavior: 'smooth' }); };
          const cancelEdit = () => { setEditingId(null); setName(''); setLoginId(''); setPassword(''); setDesignation(''); };

          return (
            <div className="bg-white p-5 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
              <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-3 md:pb-4 flex items-center gap-2"><i className="fa-solid fa-users-gear text-blue-500"></i> স্টাফ প্রোফাইল</h2>
              <form onSubmit={submitUser} className="mb-8 bg-slate-50 p-5 md:p-6 rounded-2xl border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5">
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">নাম</label><input required value={name} onChange={e=>setName(e.target.value)} className="w-full border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Full Name" /></div>
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">লগইন আইডি</label><input required value={loginId} onChange={e=>setLoginId(e.target.value)} className="w-full border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Phone/Email" /></div>
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">পাসওয়ার্ড</label><input required value={password} onChange={e=>setPassword(e.target.value)} className="w-full border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Password" /></div>
                <div><label className="block text-xs md:text-sm font-bold mb-2 text-slate-700">পদবী</label><input required value={designation} onChange={e=>setDesignation(e.target.value)} className="w-full border border-slate-300 p-3.5 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Technician" /></div>
                <div className="md:col-span-2 mt-2 flex gap-3">
                   <button type="submit" className="flex-1 md:flex-none bg-blue-600 text-white px-8 py-3.5 rounded-xl hover:bg-blue-700 font-bold shadow-lg active:scale-95 transition-all"><i className={`fa-solid ${editingId ? 'fa-pen-to-square' : 'fa-user-plus'} mr-2`}></i> {editingId ? 'প্রোফাইল আপডেট' : 'নতুন প্রোফাইল তৈরি করুন'}</button>
                   {editingId && <button type="button" onClick={cancelEdit} className="px-6 py-3.5 rounded-xl bg-slate-200 text-slate-700 font-bold hover:bg-slate-300 transition-all">Cancel</button>}
                </div>
              </form>
              <div className="hidden md:block overflow-x-auto rounded-xl border border-slate-200">
                <table className="w-full text-left border-collapse">
                  <thead><tr className="bg-slate-50 text-slate-500 uppercase text-xs tracking-wider border-b border-slate-200"><th className="p-4 font-bold">নাম</th><th className="p-4 font-bold">লগইন আইডি</th><th className="p-4 font-bold">পাসওয়ার্ড</th><th className="p-4 font-bold">পদবী</th><th className="p-4 font-bold">রোল</th><th className="p-4 font-bold text-center">অ্যাকশন</th></tr></thead>
                  <tbody className="divide-y divide-slate-100">
                    {users.map(u => (
                      <tr key={u.id} className="hover:bg-slate-50 transition">
                         <td className="p-4 font-bold text-slate-800 flex items-center gap-2">{u.avatar ? <img src={u.avatar} className="w-8 h-8 rounded-full object-cover" /> : <div className="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center text-xs font-bold">{u.name.charAt(0)}</div>} {u.name}</td>
                         <td className="p-4 text-blue-600 font-medium">{u.loginId}</td><td className="p-4 text-slate-500 font-mono text-sm bg-slate-50/50 rounded">{u.password}</td><td className="p-4 text-slate-600 text-sm">{u.designation}</td><td className="p-4"><span className={`px-2 py-1 text-[10px] font-bold uppercase rounded-md ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-slate-200 text-slate-600'}`}>{u.role === 'admin' ? 'এডমিন' : 'স্টাফ'}</span></td>
                         <td className="p-4 text-center space-x-2">{u.role !== 'admin' && <><button onClick={() => handleEdit(u)} className="bg-blue-50 text-blue-500 hover:bg-blue-500 hover:text-white w-8 h-8 rounded-lg transition"><i className="fa-solid fa-pen text-sm"></i></button><button onClick={() => showConfirm('প্রোফাইলটি ডিলিট করতে চান?', () => deleteUser(u.id))} className="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white w-8 h-8 rounded-lg transition"><i className="fa-solid fa-trash-can text-sm"></i></button></>}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="md:hidden grid grid-cols-1 gap-4">
                 {users.map(u => (
                   <div key={u.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col relative">
                      {u.role !== 'admin' && <div className="absolute top-4 right-4 flex gap-2"><button onClick={() => handleEdit(u)} className="text-blue-400 hover:text-blue-600 p-2"><i className="fa-solid fa-pen"></i></button><button onClick={() => showConfirm('প্রোফাইলটি ডিলিট করতে চান?', () => deleteUser(u.id))} className="text-red-400 hover:text-red-600 p-2"><i className="fa-solid fa-trash-can"></i></button></div>}
                      <div className="flex items-center gap-3 mb-3 border-b border-slate-100 pb-3">{u.avatar ? <img src={u.avatar} className="w-12 h-12 rounded-full object-cover shadow-sm" /> : <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-xl shadow-sm">{u.name.charAt(0)}</div>}<div><h4 className="font-bold text-slate-800 text-base leading-tight">{u.name}</h4><span className={`inline-block mt-1 px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider rounded-md ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-slate-200 text-slate-600'}`}>{u.role === 'admin' ? 'এডমিন' : 'স্টাফ'}</span></div></div>
